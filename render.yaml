services:
  - type: web
    name: claimtrack
    env: node
    buildCommand: cd server && npm install
    startCommand: node server/server.js
    envVars:
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/claimtrack.db
    disk:
      name: claimtrack-data
      mountPath: /data
      sizeGB: 1
