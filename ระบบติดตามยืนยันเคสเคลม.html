<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ระบบติดตามยืนยันเคสเคลม</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --font-display: 'Anuphan', sans-serif;
  --font-body: 'IBM Plex Sans Thai', sans-serif;
  --accent: #6366F1; --accent-2: #818CF8; --accent-glow: rgba(99,102,241,.35);
  --radius-card: 14px; --radius-btn: 11px; --radius-sm: 9px;
}
[data-theme="dark"] {
  --bg: #0A0F1C; --bg-2: #0D1322;
  --surface: #111829; --surface-2: #151D31; --surface-3: #1E2840;
  --border: rgba(255,255,255,.07); --border-2: rgba(255,255,255,.12);
  --text: #E8EDF7; --text-2: #AEB9CE; --text-muted: #6B7794;
  --shadow: 0 18px 50px rgba(0,0,0,.5);
}
[data-theme="light"] {
  --bg: #F4F6FB; --bg-2: #EEF1F8;
  --surface: #FFFFFF; --surface-2: #FFFFFF; --surface-3: #F1F4FA;
  --border: rgba(15,23,42,.09); --border-2: rgba(15,23,42,.15);
  --text: #131A2B; --text-2: #475067; --text-muted: #8A93A8;
  --shadow: 0 18px 50px rgba(20,30,60,.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body); background: var(--bg); color: var(--text);
  font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
h1, h2, h3, h4 { line-height: 1.5; padding: 0.04em 0; }
.panel-title { line-height: 1.4; }
.brand-title, .brand-sub { line-height: 1.25; }
#root { height: 100vh; }
input, button, textarea, select { font-family: inherit; }
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 99px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--border-2); background-clip: padding-box; }

.shell { display: grid; grid-template-columns: 256px 1fr; height: 100vh; background: var(--bg); }
.sidebar {
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 18px 14px; gap: 6px; z-index: 60;
}
.brand { display: flex; align-items: center; gap: 11px; padding: 6px 8px 18px; }
.brand-text { min-width: 0; }
.brand-mark { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow: 0 6px 18px var(--accent-glow); flex-shrink: 0; }
.brand-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: -.01em; }
.brand-sub { font-size: 11.5px; color: var(--text-muted); }
.nav { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 11px 13px; border-radius: var(--radius-btn);
  border: none; background: transparent; color: var(--text-2); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .15s; text-align: left; position: relative;
}
.nav-item span:not(.nav-badge) { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active { background: var(--accent); color: #fff; box-shadow: 0 5px 16px var(--accent-glow); }
.nav-item.active svg { color: #fff; }
.nav-badge { margin-left: auto; font-size: 11px; font-weight: 700; background: #EF4444; color: #fff; min-width: 19px; height: 19px; padding: 0 5px; border-radius: 99px; display: grid; place-items: center; }
.nav-item.active .nav-badge { background: rgba(255,255,255,.25); }
.sidebar-foot { border-top: 1px solid var(--border); padding-top: 14px; margin-top: 4px; }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 6px; border-radius: var(--radius-btn); }

.main { display: flex; flex-direction: column; min-width: 0; height: 100vh; }
.topbar {
  display: flex; align-items: center; gap: 14px; padding: 13px 26px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 40;
}
.hamburger { display: none; background: none; border: none; color: var(--text-2); cursor: pointer; padding: 4px; }
.topbar-search { display: flex; align-items: center; gap: 9px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px; padding: 8px 16px; width: 340px; max-width: 40vw; }
.topbar-search input { background: none; border: none; outline: none; color: var(--text); font-size: 13.5px; width: 100%; }
.topbar-search input::placeholder { color: var(--text-muted); }
.icon-btn { background: transparent; border: none; color: var(--text-2); cursor: pointer; width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; transition: all .15s; position: relative; }
.icon-btn:hover { background: var(--surface-3); color: var(--text); }
.icon-btn.notif .dot { position: absolute; top: 8px; right: 9px; width: 7px; height: 7px; border-radius: 99px; background: #EF4444; border: 2px solid var(--surface); }
.content { flex: 1; overflow-y: auto; overflow-x: hidden; }
.page-pad { padding: 28px 30px 40px; max-width: 1500px; margin: 0 auto; }
.nav-scrim { display: none; }

.panel { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 20px 22px; }
.panel-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.panel-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; letter-spacing: -.01em; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 16px; }
.dash-cols { display: grid; grid-template-columns: 1.15fr 1fr; gap: 20px; align-items: start; }
.stat-card { transition: transform .18s, box-shadow .18s, border-color .18s; }
.stat-card:hover { transform: translateY(-3px); border-color: var(--border-2); box-shadow: var(--shadow); }
.status-row:hover { opacity: .85; }
.activity-row:hover { background: var(--surface-3); border-radius: 8px; }

.toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 12px 14px; }
.search-box { display: flex; align-items: center; gap: 9px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px; padding: 8px 14px; flex: 1; min-width: 220px; max-width: 360px; }
.search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 13.5px; width: 100%; }
.search-box input::placeholder { color: var(--text-muted); }
.status-pills { display: flex; gap: 7px; flex-wrap: wrap; }
.chk { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-2); cursor: pointer; white-space: nowrap; user-select: none; }
.chk input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
.view-switch { display: flex; gap: 2px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
.view-switch button { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border: none; background: transparent; color: var(--text-muted); border-radius: 7px; cursor: pointer; font-size: 12.5px; font-weight: 600; transition: all .15s; }
.view-switch button.active { background: var(--surface-3); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.2); }
.view-switch .vlabel { display: inline; }

.table-wrap { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-card); overflow: auto; }
.ctable { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.ctable thead th { position: sticky; top: 0; background: var(--surface); text-align: left; font-size: 11.5px; font-weight: 600; color: var(--text-muted); text-transform: none; letter-spacing: .02em; padding: 13px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; z-index: 1; }
.ctable tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.ctable tbody tr:last-child td { border-bottom: none; }
.crow { cursor: pointer; transition: background .12s; }
.crow:hover { background: var(--surface-3); }
.ctable.preview thead th { background: var(--surface-3); }
.ctable.preview tbody td { padding: 9px 12px; font-size: 12.5px; }

.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(296px, 1fr)); gap: 16px; }
.case-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 16px 18px; cursor: pointer; transition: transform .18s, box-shadow .18s, border-color .18s; }
.case-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--border-2); }
.card-meta { display: flex; flex-direction: column; gap: 7px; }
.card-meta > div { display: flex; justify-content: space-between; gap: 12px; font-size: 12.5px; }
.card-meta span { color: var(--text-muted); flex-shrink: 0; }
.card-meta b { font-weight: 500; color: var(--text-2); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.kanban { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 12px; height: 100%; align-items: flex-start; }
.kcol { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); width: 280px; flex-shrink: 0; display: flex; flex-direction: column; max-height: 100%; }
.kcol-head { display: flex; justify-content: space-between; align-items: center; padding: 13px 14px; }
.kcol-body { display: flex; flex-direction: column; gap: 10px; padding: 12px; overflow-y: auto; }
.kcard { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px; cursor: pointer; transition: transform .15s, box-shadow .15s; }
.kcard:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--border-2); }
.kconfirm { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: #fff; background: var(--accent); border: none; padding: 5px 11px; border-radius: 8px; cursor: pointer; }

.drawer-overlay { position: fixed; inset: 0; background: rgba(5,8,18,.55); backdrop-filter: blur(3px); z-index: 100; display: flex; justify-content: flex-end; animation: fade .2s; }
.drawer { width: 540px; max-width: 94vw; height: 100%; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; animation: slideIn .32s cubic-bezier(.22,1,.36,1); box-shadow: -20px 0 60px rgba(0,0,0,.4); }
.drawer-head { padding: 22px 24px 20px; border-bottom: 1px solid var(--border); }
.drawer-tabs { display: flex; gap: 4px; padding: 0 18px; border-bottom: 1px solid var(--border); }
.drawer-tabs button { padding: 13px 14px; background: none; border: none; color: var(--text-muted); font-size: 13.5px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
.drawer-tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
.drawer-tabs button:hover { color: var(--text-2); }
.drawer-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 18px; }
.field-label { font-size: 11.5px; color: var(--text-muted); margin-bottom: 4px; }
.field-value { font-size: 14px; font-weight: 500; color: var(--text); }
.drawer-actions { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; background: var(--surface); }
.timeline { display: flex; flex-direction: column; gap: 4px; position: relative; padding-left: 6px; }
.tl-item { display: flex; gap: 14px; padding: 4px 0 16px; position: relative; }
.tl-item::before { content: ''; position: absolute; left: 5px; top: 16px; bottom: -2px; width: 2px; background: var(--border); }
.tl-item:last-child::before { display: none; }
.tl-dot { width: 12px; height: 12px; border-radius: 99px; flex-shrink: 0; margin-top: 3px; box-shadow: 0 0 0 4px var(--surface); z-index: 1; }
.attach-item { display: flex; align-items: center; gap: 12px; padding: 11px 13px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); }
.dropzone-sm { display: flex; align-items: center; justify-content: center; gap: 9px; padding: 14px; border: 1.5px dashed var(--border-2); border-radius: var(--radius-sm); background: transparent; color: var(--text-2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
.dropzone-sm:hover { border-color: var(--accent); color: var(--accent-2); }
.qstatus { display:grid; grid-template-columns: 1fr 1fr; gap:8px; }
.qstatus button { display:flex; align-items:center; gap:8px; padding:10px 12px; border:none; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--text-2); font-size:12.5px; font-weight:600; font-family:inherit; cursor:pointer; text-align:left; box-shadow:inset 0 0 0 1px var(--border); transition:all .14s; }
.qstatus button:hover { background:var(--surface-3); color:var(--text); }

.modal-overlay { position: fixed; inset: 0; background: rgba(5,8,18,.6); backdrop-filter: blur(4px); z-index: 110; display: grid; place-items: center; padding: 20px; animation: fade .2s; }
.modal { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px; box-shadow: var(--shadow); animation: pop .28s cubic-bezier(.22,1,.36,1); max-height: 90vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.radio-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-radius: var(--radius-sm); background: var(--surface-2); border: none; cursor: pointer; font-size: 13.5px; font-weight: 500; color: var(--text); text-align: left; transition: all .14s; }
.radio-row:hover { background: var(--surface-3); }
.textarea { width: 100%; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-size: 14px; resize: vertical; outline: none; }
.textarea:focus { border-color: var(--accent); }
.dropzone { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 36px 20px; border: 2px dashed var(--border-2); border-radius: var(--radius-card); cursor: pointer; transition: all .18s; }
.dropzone:hover, .dropzone.drag { border-color: var(--accent); background: var(--surface-2); }

[data-density="compact"] .ctable tbody td { padding: 8px 14px; }
[data-density="compact"] .nav-item { padding: 9px 13px; }
[data-density="compact"] .page-pad { padding: 20px 24px 32px; }
[data-density="comfy"] .ctable tbody td { padding: 16px 16px; }
[data-density="comfy"] .page-pad { padding: 36px 40px 48px; }

@keyframes fade { from { opacity: 0; } }
@keyframes slideIn { from { transform: translateX(40px); opacity: 0; } }
@keyframes pop { from { transform: scale(.95) translateY(10px); opacity: 0; } }
@keyframes toastIn { from { transform: translate(-50%, 20px); opacity: 0; } }

@media (max-width: 1100px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-cols { grid-template-columns: 1fr; }
}
@media (max-width: 860px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { position: fixed; inset: 0 auto 0 0; width: 264px; transform: translateX(-100%); transition: transform .28s cubic-bezier(.22,1,.36,1); }
  .sidebar.open { transform: translateX(0); box-shadow: 20px 0 60px rgba(0,0,0,.5); }
  .nav-scrim { display: block; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 50; }
  .hamburger { display: grid; place-items: center; }
  .topbar-search { max-width: none; flex: 1; width: auto; }
  .view-switch .vlabel { display: none; }
  .field-grid { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .topbar { padding: 11px 16px; }
  .page-pad { padding: 18px 16px 32px; }
  .topbar-search { display: none; }
  .qstatus { grid-template-columns: 1fr; }
}
</style>
</head>
<body style="background-color: rgb(232, 219, 219); font-family: Anuphan">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<!-- SheetJS — อ่านไฟล์ Excel จริงในเบราว์เซอร์ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous"></script>

<!-- ===================================================================== -->
<!-- data.js — โมเดลข้อมูลจาก Excel จริง (เฉพาะคอลัมน์ B/C/D/G/H/I/J/K/L/M/P/Q) -->
<!-- ===================================================================== -->
<script>
// ===== สถานะเคส (จัดการในแอปผ่านปุ่ม Action — ไม่ได้มาจากไฟล์ Excel) =====
// แบ่งกลุ่ม: ดำเนินการ (workflow) + สถานะเคลม A.. + สถานะเคลียร์ B.. (ตามรายงานจริง) + กำหนดเอง
// terminal:true = ถือว่าปิด/เสร็จสิ้น (ใช้คำนวณ "กำลังดำเนินการ")
const DEFAULT_STATUSES = [
  { key: 'new_proof',    label: 'อยู่ระหว่างขอหลักฐานใหม่',         color: '#FB923C', group: 'ดำเนินการ' },
  { key: 'confirm_price',label: 'อยู่ระหว่างยืนยันราคาเคลม',        color: '#14B8A6', group: 'ดำเนินการ' },
  { key: 'find_owner',   label: 'อยู่ระหว่างขอรายชื่อผู้รับผิดชอบ',  color: '#F59E0B', group: 'ดำเนินการ' },
  { key: 'sent_owner',   label: 'ส่งเอกสารให้ผู้รับผิดชอบ',          color: '#8B5CF6', group: 'ดำเนินการ' },
  { key: 'received',     label: 'ได้รับเอกสารแล้ว',                 color: '#3B82F6', group: 'ดำเนินการ' },
  { key: 'consider_co', label: 'ขอพิจารณาลงบริษัท',                color: '#EC4899', group: 'ดำเนินการ' },
  { key: 'closed',       label: 'ปิดจบไม่เคลม',                     color: '#10B981', group: 'ดำเนินการ', terminal: true },
  // สถานะเคลม (A00–A89) จากรายงาน
  { key: 'A00', label: 'A00 อยู่ระหว่างการพิจารณา',                 color: '#38BDF8', group: 'สถานะเคลม' },
  { key: 'A01', label: 'A01 อยู่ระหว่างการส่งเอกสารประกอบการเคลม',   color: '#818CF8', group: 'สถานะเคลม' },
  { key: 'A02', label: 'A02 อยู่ระหว่างการตรวจสอบเอกสาร',           color: '#A78BFA', group: 'สถานะเคลม' },
  { key: 'A03', label: 'A03 อยู่ระหว่างการโอนเงิน',                 color: '#F472B6', group: 'สถานะเคลม' },
  { key: 'A04', label: 'A04 โอนเงิน',                              color: '#34D399', group: 'สถานะเคลม', terminal: true },
  { key: 'A89', label: 'A89 ปิดจบ ไม่เคลม',                        color: '#94A3B8', group: 'สถานะเคลม', terminal: true },
  // สถานะเคลียร์ (B00–B05) จากรายงาน
  { key: 'B00', label: 'B00 อยู่ระหว่างการประเมินผู้รับผิดชอบ',      color: '#FBBF24', group: 'สถานะเคลียร์' },
  { key: 'B01', label: 'B01 อยู่ระหว่างการตอบกลับของ DC',          color: '#FB923C', group: 'สถานะเคลียร์' },
  { key: 'B02', label: 'B02 อยู่ระหว่างการอนุมัติของผู้บริหาร',      color: '#F59E0B', group: 'สถานะเคลียร์' },
  { key: 'B03', label: 'B03 ค้างส่งเอกสารหักเงิน',                 color: '#EF4444', group: 'สถานะเคลียร์' },
  { key: 'B04', label: 'B04 เคลียร์รับเอกสาร',                     color: '#2DD4BF', group: 'สถานะเคลียร์' },
  { key: 'B05', label: 'B05 บัญชีรับเอกสาร',                       color: '#22D3EE', group: 'สถานะเคลียร์', terminal: true },
];
const STATUS_GROUPS = ['ดำเนินการ', 'สถานะเคลม', 'สถานะเคลียร์', 'กำหนดเอง'];
const STATUSES = DEFAULT_STATUSES;
const STATUS_MAP = Object.fromEntries(STATUSES.map(s => [s.key, s]));
const STATUS_ORDER = STATUSES.map(s => s.key);

const OWNERS    = ['พิมพ์', 'ชลนภา', 'ศิริพัฒนา'];
const OWNERS_CC = ['จิดาภา', 'ธนิดา', 'ชิดชนก', 'กนกพิชญ์', 'สิริรัตน์'];

// แปลง array-of-arrays (จาก SheetJS) → รายการเคสดิบ ตามคอลัมน์ที่กำหนด
function parseClaimRows(aoa) {
  let h = -1;
  for (let i = 0; i < aoa.length; i++) {
    const row = aoa[i] || [];
    if (row.some(c => String(c == null ? '' : c).indexOf(HEADER_MARK) > -1)) { h = i; break; }
  }
  const start = h >= 0 ? h + 1 : 0;
  const out = [];
  const seen = new Set();
  for (let i = start; i < aoa.length; i++) {
    const r = aoa[i] || [];
    const get = (k) => String(r[EXCEL_COLS[k]] == null ? '' : r[EXCEL_COLS[k]]).trim();
    const receiptNo = get('receiptNo');
    if (!receiptNo) continue;                 // ข้ามแถวหัวกลุ่ม DC / แถว "รวม..." / "รวมทั้งสิ้น"
    if (receiptNo.indexOf('รวม') === 0) continue;
    if (receiptNo.indexOf(HEADER_MARK) > -1) continue;
    if (seen.has(receiptNo)) continue;        // ข้ามแถวซ้ำในไฟล์เดียวกัน
    seen.add(receiptNo);
    out.push({
      receiptNo,
      docDate: get('docDate'), damageType: get('damageType'),
      billNo: get('billNo'), billDate: get('billDate'),
      customerType: get('customerType'), billType: get('billType'),
      sender: get('sender'), receiver: get('receiver'),
      productType: get('productType'),
      loadPoint: get('loadPoint'), unloadPoint: get('unloadPoint'),
    });
  }
  return out;
}

// ตัดรหัสนำหน้าออกเพื่อแสดงผลกระชับ เช่น "610  DC พุทธมณฑลสาย 3" → "DC พุทธมณฑลสาย 3"
function dispLabel(s) {
  if (!s) return '—';
  return String(s).replace(/^[0-9A-Za-z./-]+\s{2,}/, '').trim() || String(s);
}

// ===== ตัวช่วยวันที่/เวลา (สำหรับ event log ในแอป) =====
function fmtDate(d) {
  if (typeof d === 'string') return d;
  const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear() + 543}`;
}
function fmtDateTime(d) {
  if (typeof d === 'string') return d;
  return `${fmtDate(d)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

  const owner   = opts.owner   || '—';
  const ownerCC = opts.ownerCC || '—';
  const idx = STATUS_ORDER.indexOf(status);
  const baseTime = opts.at ? opts.at.getTime() : (Date.now() - (10 - (__seq % 10)) * 3600000);

  for (let s = 1; s <= idx; s++) {
    events.push({ at: new Date(baseTime + (s + 1) * 1200000), text: `เปลี่ยนสถานะเป็น “${STATUS_MAP[STATUS_ORDER[s]].label}”`, type: 'status', by: owner !== '—' ? owner : 'ฝ่ายเคลียร์เคลม' });
  }
  __seq++;
  return {
    ...row,
    id: row.receiptNo,
    billStatus: status,
    confirmed,
    owner,
    ownerCC,
    claimAmount: null,        // มูลค่ายืนยันเคลม (กรอกโดยผู้ดูแล)

}

];

// ===== KPI / สรุป =====
function summarize(cases) {
  const byStatus = {};
  let unconfirmed = 0, confirmed = 0, terminal = 0;
  cases.forEach(c => {
    byStatus[c.billStatus] = (byStatus[c.billStatus] || 0) + 1;
    if (!c.confirmed) unconfirmed++; else confirmed++;
    const s = window.STATUS_MAP[c.billStatus];
    if (s && s.terminal) terminal++;
  });
  return { byStatus, unconfirmed, confirmed, total: cases.length, closed: terminal, active: cases.length - terminal };
}

// รายการสถานะจัดกลุ่ม (อ่าน window.STATUSES ปัจจุบัน เพื่อรองรับสถานะที่เพิ่มเอง)
function groupedStatuses() {
  const out = [];

    let g = out.find(x => x.group === s.group);
    if (!g) { g = { group: s.group || 'อื่นๆ', items: [] }; out.push(g); }
    g.items.push(s);
  });
  return out;
}

function useTweaks(defaults) {

    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch (e) {}

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function hexA(hex, a) {
  const h = hex.replace('#', '');
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

function StatusBadge({ statusKey, size = 'md' }) {
  const s = window.STATUS_MAP[statusKey];
  if (!s) return null;
  const pad = size === 'sm' ? '3px 9px' : '5px 12px';
  const fs = size === 'sm' ? 12 : 12.5;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:6, padding:pad, borderRadius:999, fontSize:fs, fontWeight:600, whiteSpace:'nowrap', color:s.color, background:hexA(s.color,0.13), boxShadow:`inset 0 0 0 1px ${hexA(s.color,0.28)}` }}>
      <span style={{ width:6, height:6, borderRadius:99, background:s.color, boxShadow:`0 0 8px ${s.color}` }}></span>{s.label}
    </span>
  );
}

function Avatar({ name, size = 30 }) {
  if (!name || name === '—') {
    return <span style={{ width:size, height:size, borderRadius:99, display:'inline-grid', placeItems:'center', background:'var(--surface-3)', color:'var(--text-muted)', fontSize:size*0.42, border:'1px dashed var(--border)' }}><Icon name="user" size={size*0.5} /></span>;
  }
  const initial = name.trim().charAt(0);
  const hues = [220, 280, 160, 30, 340, 200];
  const hue = hues[name.charCodeAt(0) % hues.length];
  return (
    <span style={{ width:size, height:size, borderRadius:99, display:'inline-grid', placeItems:'center', fontSize:size*0.42, fontWeight:700, color:'#fff', background:`linear-gradient(135deg, oklch(0.6 0.13 ${hue}), oklch(0.5 0.15 ${hue+25}))` }}>{initial}</span>
  );
}

function Btn({ children, variant = 'ghost', size = 'md', icon, onClick, style, title, disabled, full }) {
  const sizes = { sm: ['7px 12px', 13], md: ['9px 16px', 14], lg: ['12px 22px', 15] };
  const [pad, fs] = sizes[size];
  const base = { display:'inline-flex', alignItems:'center', justifyContent:'center', gap:8, padding:pad, fontSize:fs, fontWeight:600, borderRadius:'var(--radius-btn)', cursor: disabled?'not-allowed':'pointer', border:'none', fontFamily:'inherit', transition:'all .16s ease', whiteSpace:'nowrap', width: full?'100%':'auto', opacity: disabled?0.5:1, ...style };
  const variants = {
    primary: { background:'var(--accent)', color:'#fff', boxShadow:'0 4px 16px var(--accent-glow)' },
    solid:   { background:'var(--surface-3)', color:'var(--text)', boxShadow:'inset 0 0 0 1px var(--border)' },
    ghost:   { background:'transparent', color:'var(--text-2)', boxShadow:'inset 0 0 0 1px var(--border)' },
    subtle:  { background:'var(--surface-2)', color:'var(--text-2)' },
    danger:  { background:hexA('#EF4444',0.14), color:'#F87171', boxShadow:'inset 0 0 0 1px '+hexA('#EF4444',0.3) },
  };
  return (
    <button style={{...base, ...variants[variant]}} onClick={disabled?undefined:onClick} title={title} disabled={disabled}>
      {icon && <Icon name={icon} size={size==='sm'?15:17} />}{children}
    </button>
  );
}

function StatCard({ label, value, sub, icon, color = '#6366F1', onClick }) {
  return (
    <div className="stat-card" onClick={onClick} style={{
      background:'var(--surface-2)', borderRadius:'var(--radius-card)', padding:'18px 20px',
      position:'relative', overflow:'hidden', cursor:onClick?'pointer':'default',
      border:`1px solid ${hexA(color,0.25)}`,
      borderLeft:`4px solid ${color}`,
      boxShadow:`0 2px 12px ${hexA(color,0.10)}`,
    }}>
      {/* gradient overlay */}
      <div style={{ position:'absolute', inset:0, background:`radial-gradient(140% 140% at 100% 0%, ${hexA(color,0.18)}, transparent 60%)`, pointerEvents:'none' }}></div>
      {/* bottom color strip */}
      <div style={{ position:'absolute', bottom:0, left:0, right:0, height:3, background:`linear-gradient(90deg, ${hexA(color,0.6)}, ${hexA(color,0.15)})`, pointerEvents:'none' }}></div>

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', position:'relative' }}>
        <div style={{ fontSize:13, color:'var(--text-muted)', fontWeight:600 }}>{label}</div>
        <span style={{ width:36, height:36, borderRadius:11, display:'grid', placeItems:'center', color, background:hexA(color,0.18), boxShadow:`0 4px 12px ${hexA(color,0.25)}` }}>
          <Icon name={icon} size={19} />
        </span>
      </div>
      <div style={{ display:'flex', alignItems:'baseline', gap:10, marginTop:10, position:'relative' }}>
        <div style={{ fontSize:32, fontWeight:800, color, letterSpacing:'-0.03em', fontFeatureSettings:'"tnum"', textShadow:`0 2px 12px ${hexA(color,0.3)}` }}>{value}</div>
      </div>
      {sub && <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:4, position:'relative' }}>{sub}</div>}
    </div>
  );
}

function Toast({ toast }) {
  if (!toast) return null;
  const err = toast.kind === 'error';
  return (
    <div key={toast.id} style={{ position:'fixed', bottom:26, left:'50%', transform:'translateX(-50%)', zIndex:200, background:'var(--surface-3)', color:'var(--text)', padding:'13px 20px', borderRadius:12, boxShadow:'0 14px 40px rgba(0,0,0,.45)', border:'1px solid var(--border)', display:'flex', alignItems:'center', gap:11, fontSize:14, fontWeight:500, animation:'toastIn .35s cubic-bezier(.22,1,.36,1)', maxWidth:'90vw' }}>
      <span style={{ color: err?'#F87171':'#34D399', display:'grid', placeItems:'center' }}><Icon name={err?'alert':'checkCircle'} size={20} /></span>{toast.msg}
    </div>
  );
}

function StatusProgress({ statusKey }) {
  const s = window.STATUS_MAP[statusKey];
  if (!s) return null;
  return <div style={{ height:6, borderRadius:99, background:`linear-gradient(90deg, ${hexA(s.color,.45)}, ${s.color})` }}></div>;
}

// ตัวเลือกสถานะแบบจัดกลุ่ม (ใช้ร่วมในตาราง/Drawer/ตั้งค่า) + ปุ่ม "ระบุสถานะเอง"
function StatusPicker({ current, onPick, onAdd }) {
  const groups = window.groupedStatuses();
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
      {groups.map(g => (
        <div key={g.group}>
          <div style={{ fontSize:11, fontWeight:600, color:'var(--text-muted)', margin:'2px 0 6px', letterSpacing:'.02em' }}>{g.group}</div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {g.items.map(st => (
              <button key={st.key} onClick={() => onPick(st.key)} style={{
                display:'flex', alignItems:'center', gap:9, padding:'8px 11px', border:'none', borderRadius:'var(--radius-sm)',
                background: current===st.key ? hexA(st.color,.12) : 'var(--surface-2)', color: current===st.key ? st.color : 'var(--text-2)',
                fontSize:12.5, fontWeight:600, fontFamily:'inherit', cursor:'pointer', textAlign:'left',
                boxShadow: current===st.key ? `inset 0 0 0 1.5px ${hexA(st.color,.5)}` : 'inset 0 0 0 1px var(--border)' }}>
                <span style={{ width:9, height:9, borderRadius:3, background:st.color, flexShrink:0 }}></span>
                <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{st.label}</span>
                {current===st.key && <Icon name="check" size={14} style={{ color:st.color }} />}
              </button>
            ))}
          </div>
        </div>
      ))}
      {onAdd && (
        <button onClick={onAdd} style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:7, padding:'10px', border:'1.5px dashed var(--border-2)', borderRadius:'var(--radius-sm)', background:'transparent', color:'var(--accent-2)', fontSize:13, fontWeight:600, fontFamily:'inherit', cursor:'pointer' }}>
          <Icon name="plus" size={16} />เพิ่ม / ระบุสถานะเอง
        </button>
      )}
    </div>
  );
}

Object.assign(window, { hexA, StatusBadge, Avatar, Btn, StatCard, Toast, StatusProgress, StatusPicker });
</script>

<script type="text/babel">
const { useMemo } = React;

function Dashboard({ cases, onOpenCase, onGotoCases, onUpload }) {
  const sum = window.summarize(cases);
  const STATUSES = window.STATUSES.filter(s => sum.byStatus[s.key] > 0);

  // มูลค่ายืนยันเคลมรวม
  const totalClaimAmount = useMemo(() =>
    cases.filter(c => c.claimAmount != null).reduce((s, c) => s + Number(c.claimAmount), 0),
  [cases]);
  const claimCount = useMemo(() => cases.filter(c => c.claimAmount != null).length, [cases]);

  // แยกตามประเภทความเสียหาย
  const damage = useMemo(() => {
    const map = {};
    cases.forEach(c => { const k = window.dispLabel(c.damageType) || 'ไม่ระบุ'; map[k] = (map[k]||0)+1; });
    return Object.entries(map).sort((a,b) => b[1]-a[1]);
  }, [cases]);
  const maxDamage = Math.max(...damage.map(d => d[1]), 1);

  const recent = useMemo(() => {
    const all = [];
    cases.forEach(c => c.events.forEach(e => all.push({ ...e, case: c })));
    return all.sort((a,b) => b.at - a.at).slice(0, 7);
  }, [cases]);

  return (
    <div className="page-pad" style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', flexWrap:'wrap', gap:14 }}>
        <div style={{ flex:'1 1 340px', minWidth:0 }}>
          <div style={{ fontSize:13, color:'var(--accent-2)', fontWeight:600, letterSpacing:'.04em' }}>ภาพรวมระบบ</div>
          <h1 style={{ fontFamily:'var(--font-display)', fontSize:28, fontWeight:700, margin:'4px 0 0', letterSpacing:'-0.02em', color:'#EF4444' }}>แดชบอร์ดติดตามเคสเคลม</h1>
          <div style={{ fontSize:13.5, color:'var(--text-muted)', marginTop:4 }}>ข้อมูลจากไฟล์ Excel เคลียร์เคลม · {cases.length.toLocaleString('th-TH')} เคสในระบบ</div>
        </div>
        <Btn variant="primary" icon="upload" onClick={onUpload}>อัปโหลดไฟล์ Excel</Btn>
      </div>

      <div className="kpi-grid">
        <StatCard label="เคสทั้งหมดในระบบ" value={sum.total.toLocaleString('th-TH')} sub={`กำลังดำเนินการ ${sum.active} เคส`} icon="box" color="#3B82F6" onClick={onGotoCases} />
        <StatCard label="รอยืนยันรับเคส" value={sum.unconfirmed.toLocaleString('th-TH')} sub="ต้องดำเนินการยืนยัน" icon="clock" color="#F59E0B" onClick={()=>onGotoCases('unconfirmed')} />
        <StatCard label="ยืนยันรับแล้ว" value={sum.confirmed.toLocaleString('th-TH')} sub="รับเข้าระบบเรียบร้อย" icon="checkCircle" color="#14B8A6" />
        <StatCard label="ปิด / เสร็จสิ้น" value={sum.closed.toLocaleString('th-TH')} sub="ปิดจบ / โอนเงิน / รับเอกสาร" icon="layers" color="#10B981" onClick={()=>onGotoCases('closed')} />
        <StatCard
          label="มูลค่ายืนยันเคลม"
          value={totalClaimAmount > 0 ? '฿' + (totalClaimAmount >= 1000000
            ? (totalClaimAmount / 1000000).toLocaleString('th-TH', { maximumFractionDigits: 2 }) + 'M'
            : totalClaimAmount.toLocaleString('th-TH')) : '฿0'}
          sub={`ระบุมูลค่าแล้ว ${claimCount} เคส`}
          icon="report"
          color="#A855F7"
        />
      </div>

      <div className="dash-cols">
        <div className="panel">
          <div className="panel-head">
            <h3 className="panel-title">จำนวนเคสตามสถานะ</h3>
            <Btn variant="subtle" size="sm" icon="list" onClick={onGotoCases}>ดูทั้งหมด</Btn>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:14, marginTop:6 }}>
            {STATUSES.map(s => {
              const v = sum.byStatus[s.key];
              const pct = sum.total ? (v / sum.total * 100) : 0;
              return (
                <div key={s.key} onClick={()=>onGotoCases(s.key)} style={{ cursor:'pointer' }} className="status-row">
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:7 }}>
                    <span style={{ display:'flex', alignItems:'center', gap:9, fontSize:13.5, color:'var(--text-2)', fontWeight:500 }}>
                      <span style={{ width:9, height:9, borderRadius:3, background:s.color, boxShadow:`0 0 8px ${window.hexA(s.color,.6)}` }}></span>{s.label}
                    </span>
                    <span style={{ fontSize:14, fontWeight:700, fontFeatureSettings:'"tnum"' }}>{v}</span>
                  </div>
                  <div style={{ height:7, background:'var(--surface-3)', borderRadius:99, overflow:'hidden' }}>
                    <div style={{ width:pct+'%', height:'100%', background:`linear-gradient(90deg, ${window.hexA(s.color,.6)}, ${s.color})`, borderRadius:99, transition:'width .7s cubic-bezier(.22,1,.36,1)' }}></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
          <Donut sum={sum} />
          <div className="panel">
            <div className="panel-head"><h3 className="panel-title">เคสแยกตามประเภทความเสียหาย</h3></div>
            <div style={{ display:'flex', flexDirection:'column', gap:12, marginTop:12 }}>
              {damage.map(([k,v],i) => (
                <div key={i}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6, fontSize:13, color:'var(--text-2)' }}>
                    <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{k}</span>

              <span style={{ width:32, height:32, borderRadius:9, display:'grid', placeItems:'center', flexShrink:0, color: e.type==='import'?'#34D399':e.type==='confirm'?'#6366F1':'#F59E0B', background: window.hexA(e.type==='import'?'#10B981':e.type==='confirm'?'#6366F1':'#F59E0B',.13) }}>
                <Icon name={e.type==='import'?'excel':e.type==='confirm'?'checkCircle':'refresh'} size={17} />

              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13.5, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{e.text}</div>
                <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:2 }}>{e.case.id} · {e.case.sender}</div>
              </div>
              <div style={{ textAlign:'right', flexShrink:0 }}>
                <div style={{ fontSize:12, color:'var(--text-muted)' }}>{window.fmtDateTime(e.at)}</div>
                <div style={{ fontSize:11.5, color:'var(--text-2)', marginTop:2 }}>โดย {e.by}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Donut({ sum }) {
  const STATUSES = window.STATUSES.filter(s => sum.byStatus[s.key] > 0);
  let acc = 0; const segs = [];
  STATUSES.forEach(s => {
    const v = sum.byStatus[s.key];
    const pct = sum.total ? v/sum.total*100 : 0;
    segs.push(`${s.color} ${acc}% ${acc+pct}%`); acc += pct;
  });
  return (
    <div className="panel">
      <div className="panel-head"><h3 className="panel-title">สัดส่วนสถานะ</h3></div>
      <div style={{ display:'flex', alignItems:'center', gap:20, marginTop:8 }}>
        <div style={{ position:'relative', width:118, height:118, flexShrink:0 }}>
          <div style={{ width:'100%', height:'100%', borderRadius:99, background:`conic-gradient(${segs.join(',')})` }}></div>
          <div style={{ position:'absolute', inset:13, borderRadius:99, background:'var(--surface-2)', display:'grid', placeItems:'center', textAlign:'center' }}>
            <div><div style={{ fontSize:26, fontWeight:700, lineHeight:1 }}>{sum.active}</div><div style={{ fontSize:11, color:'var(--text-muted)', marginTop:3 }}>กำลังดำเนินการ</div></div>
          </div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:7, flex:1 }}>
          {STATUSES.map(s => (
            <div key={s.key} style={{ display:'flex', alignItems:'center', gap:8, fontSize:12 }}>
              <span style={{ width:8, height:8, borderRadius:2, background:s.color, flexShrink:0 }}></span>
              <span style={{ color:'var(--text-2)', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.label}</span>
              <span style={{ fontWeight:700, color:'var(--text)' }}>{sum.byStatus[s.key]}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

window.Dashboard = Dashboard;
</script>

<script type="text/babel">
const { useState: useStateC, useMemo: useMemoC } = React;
const dl = window.dispLabel;

function CasesView({ cases, view, setView, onOpenCase, onConfirm, onSetStatus, onAddStatus, onUpload, onExport, initialFilter }) {
  const [q, setQ] = useStateC('');
  const [statusFilter, setStatusFilter] = useStateC(initialFilter && window.STATUS_MAP[initialFilter] ? initialFilter : 'all');
  const [onlyUnconfirmed, setOnlyUnconfirmed] = useStateC(initialFilter === 'unconfirmed');
  const [scFilter, setScFilter]   = useStateC('all');
  const [ccFilter, setCcFilter]   = useStateC('all');

  // แสดง pill เฉพาะสถานะที่มีเคสอยู่ (+ สถานะที่กำลังกรองอยู่) + consider_co แสดงเสมอ
  const STATUSES = window.STATUSES.filter(s => statusFilter === s.key || cases.some(c => c.billStatus === s.key) || s.key === 'consider_co');
  // รายชื่อ SC / CC ที่มีในข้อมูลจริง (ไม่รวม '—')
  const scOptions = useMemoC(() => {
    const s = new Set(cases.map(c => c.owner).filter(o => o && o !== '—'));
    return ['all', ...Array.from(s).sort((a,b) => a.localeCompare(b,'th'))];
  }, [cases]);
  const ccOptions = useMemoC(() => {
    const s = new Set(cases.map(c => c.ownerCC).filter(o => o && o !== '—'));
    return ['all', ...Array.from(s).sort((a,b) => a.localeCompare(b,'th'))];
  }, [cases]);

  const filtered = useMemoC(() => {
    let r = cases.filter(c => {
      if (statusFilter !== 'all' && c.billStatus !== statusFilter) return false;
      if (onlyUnconfirmed && c.confirmed) return false;
      if (scFilter !== 'all' && c.owner   !== scFilter) return false;
      if (ccFilter !== 'all' && c.ownerCC !== ccFilter) return false;
      if (q) {
        const hay = `${c.id} ${c.receiptNo} ${c.billNo} ${c.sender} ${c.receiver} ${c.productType} ${c.damageType} ${c.loadPoint} ${c.unloadPoint}`.toLowerCase();
        if (!hay.includes(q.toLowerCase())) return false;
      }
      return true;
    });
    return r;
  }, [cases, q, statusFilter, onlyUnconfirmed, scFilter, ccFilter]);

  return (
    <div className="page-pad" style={{ display:'flex', flexDirection:'column', gap:16, height:'100%' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', flexWrap:'wrap', gap:14 }}>
        <div style={{ flex:'1 1 300px', minWidth:0 }}>
          <h1 style={{ fontFamily:'var(--font-display)', fontSize:26, fontWeight:700, margin:0, letterSpacing:'-0.02em' }}><span style={{ color:'#fc0000' }}>เคสเคลมทั้งหมด</span></h1>
          <div style={{ fontSize:13.5, color:'var(--text-muted)', marginTop:4 }}>พบ {filtered.length.toLocaleString('th-TH')} เคส จากทั้งหมด {cases.length.toLocaleString('th-TH')} เคส</div>
        </div>
        <div style={{ display:'flex', gap:9 }}>
          <Btn variant="ghost" icon="download" size="md" onClick={onExport}>ส่งออก</Btn>
          <Btn variant="primary" icon="upload" onClick={onUpload}>อัปโหลด Excel</Btn>
        </div>
      </div>

      <div className="toolbar">
        <div className="search-box">
          <Icon name="search" size={17} style={{ color:'var(--text-muted)', flexShrink:0 }} />
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="ค้นหาเลขรับบิล, เลขบิล, บริษัท, สินค้า, DC..." />
          {q && <button onClick={()=>setQ('')} style={{ background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', display:'grid', placeItems:'center' }}><Icon name="close" size={15} /></button>}
        </div>

        <div className="status-pills">
          <Pill active={statusFilter==='all'} onClick={()=>setStatusFilter('all')}>ทั้งหมด</Pill>
          {STATUSES.map(s => <Pill key={s.key} active={statusFilter===s.key} color={s.color} onClick={()=>setStatusFilter(statusFilter===s.key?'all':s.key)}>{s.label}</Pill>)}
        </div>

        <div style={{ display:'flex', gap:10, alignItems:'center', marginLeft:'auto', flexWrap:'wrap' }}>
          {/* ตัวกรอง SC */}
          <div style={{ display:'flex', alignItems:'center', gap:7 }}>
            <Icon name="user" size={15} style={{ color:'var(--text-muted)', flexShrink:0 }} />
            <select value={scFilter} onChange={e => setScFilter(e.target.value)}
              style={{ background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', color: scFilter!=='all' ? 'var(--accent-2)' : 'var(--text-2)', fontSize:13, fontWeight:600, padding:'6px 10px', fontFamily:'inherit', cursor:'pointer', outline:'none',
                boxShadow: scFilter!=='all' ? `inset 0 0 0 1.5px var(--accent)` : 'none' }}>
              <option value="all">SC ทั้งหมด</option>
              {scOptions.filter(o => o !== 'all').map(o => <option key={o} value={o}>{o}</option>)}
            </select>
          </div>
          {/* ตัวกรอง CC */}
          <div style={{ display:'flex', alignItems:'center', gap:7 }}>
            <Icon name="user" size={15} style={{ color:'var(--text-muted)', flexShrink:0 }} />
            <select value={ccFilter} onChange={e => setCcFilter(e.target.value)}
              style={{ background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', color: ccFilter!=='all' ? 'var(--accent-2)' : 'var(--text-2)', fontSize:13, fontWeight:600, padding:'6px 10px', fontFamily:'inherit', cursor:'pointer', outline:'none',
                boxShadow: ccFilter!=='all' ? `inset 0 0 0 1.5px var(--accent)` : 'none' }}>
              <option value="all">CC ทั้งหมด</option>
              {ccOptions.filter(o => o !== 'all').map(o => <option key={o} value={o}>{o}</option>)}
            </select>
          </div>
          <label className="chk">
            <input type="checkbox" checked={onlyUnconfirmed} onChange={e=>setOnlyUnconfirmed(e.target.checked)} />
            <span>เฉพาะที่รอยืนยัน</span>
          </label>
          <div className="view-switch">
            {[['table','table','ตาราง'],['grid','grid','การ์ด'],['kanban','columns','Kanban']].map(([v,ic,lb]) => (
              <button key={v} className={view===v?'active':''} onClick={()=>setView(v)} title={lb}><Icon name={ic} size={16} /><span className="vlabel">{lb}</span></button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ flex:1, minHeight:0 }}>
        {view==='table' && <CaseTable cases={filtered} onOpenCase={onOpenCase} onConfirm={onConfirm} onSetStatus={onSetStatus} onAddStatus={onAddStatus} />}
        {view==='grid' && <CaseGrid cases={filtered} onOpenCase={onOpenCase} onConfirm={onConfirm} />}
        {view==='kanban' && <Kanban cases={filtered} onOpenCase={onOpenCase} onConfirm={onConfirm} />}
      </div>
    </div>
  );
}

function Pill({ children, active, color, onClick }) {
  return (
    <button onClick={onClick} style={{ padding:'6px 13px', borderRadius:999, fontSize:12.5, fontWeight:600, cursor:'pointer', border:'none', fontFamily:'inherit', whiteSpace:'nowrap', transition:'all .15s',
      color: active ? (color||'var(--accent)') : 'var(--text-muted)',
      background: active ? window.hexA(color||'#6366F1',0.14) : 'transparent',
      boxShadow: active ? `inset 0 0 0 1px ${window.hexA(color||'#6366F1',0.3)}` : 'inset 0 0 0 1px var(--border)' }}>{children}</button>
  );
}

// เมนูปุ่ม Action เปลี่ยนสถานะแบบเร็ว (สถานะ = ปุ่ม Action) — จัดกลุ่ม + ระบุสถานะเอง
function StatusActionMenu({ c, onSetStatus, onConfirm, onAddStatus }) {
  const [open, setOpen] = useStateC(false);
  return (
    <span style={{ position:'relative', display:'inline-block' }} onClick={e=>e.stopPropagation()}>
      <Btn variant="solid" size="sm" icon="refresh" onClick={()=>setOpen(o=>!o)}>สถานะ</Btn>
      {open && (
        <>
          <div style={{ position:'fixed', inset:0, zIndex:30 }} onClick={()=>setOpen(false)}></div>
          <div style={{ position:'absolute', right:0, top:'calc(100% + 6px)', zIndex:31, width:300, maxHeight:420, overflowY:'auto', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius-card)', boxShadow:'var(--shadow)', padding:12 }}>
            {!c.confirmed && (
              <button onClick={()=>{onConfirm(c);setOpen(false);}} style={{ display:'flex', alignItems:'center', gap:9, width:'100%', padding:'9px 11px', marginBottom:10, border:'none', borderRadius:'var(--radius-sm)', background:window.hexA('#6366F1',.12), color:'var(--accent-2)', fontSize:12.5, fontWeight:700, fontFamily:'inherit', cursor:'pointer', textAlign:'left' }}>
                <Icon name="check" size={15} />ยืนยันรับเคสเข้าระบบ
              </button>
            )}
            <StatusPicker current={c.billStatus} onPick={(k)=>{onSetStatus(c, k);setOpen(false);}} onAdd={onAddStatus ? ()=>{setOpen(false);onAddStatus();} : null} />
          </div>
        </>
      )}
    </span>
  );
}

function CaseTable({ cases, onOpenCase, onConfirm, onSetStatus, onAddStatus }) {
  return (
    <div className="table-wrap">
      <table className="ctable">
        <thead>
          <tr>
            <th>เลขที่รับบิล / เลขที่บิล</th>
            <th>ความเสียหาย</th>
            <th>ผู้ส่ง → ผู้รับ</th>
            <th>สินค้า</th>
            <th>ประเภทลูกค้า / บิล</th>
            <th>เส้นทาง (จุดขึ้น → จุดลง)</th>
            <th>วันที่เอกสาร</th>
            <th>ผู้รับผิดชอบเคส (SC)</th>
            <th>ผู้รับผิดชอบเคส (CC)</th>
            <th>สถานะ</th>
            <th style={{textAlign:'right'}}>มูลค่ายืนยันเคลม</th>
            <th>DC/หน่วยงาน ที่เสียหาย</th>
            <th style={{textAlign:'right'}}>จัดการ</th>
          </tr>
        </thead>
        <tbody>
          {cases.map(c => (
            <tr key={c.id} onClick={()=>onOpenCase(c)} className="crow">
              <td>
                <div style={{ fontWeight:700, fontSize:13.5, fontFeatureSettings:'"tnum"' }}>{c.receiptNo}</div>
                <div style={{ fontSize:11.5, color:'var(--text-muted)', fontFeatureSettings:'"tnum"' }}>{c.billNo || '—'}</div>
              </td>
              <td><span style={{ fontSize:13, color:'var(--text-2)' }}>{dl(c.damageType)}</span></td>
              <td>
                <div style={{ fontSize:13, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:170 }}>{c.sender}</div>
                <div style={{ fontSize:11.5, color:'var(--text-muted)', display:'flex', alignItems:'center', gap:4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:170 }}><Icon name="arrowRight" size={11} />{c.receiver}</div>
              </td>
              <td><span style={{ fontSize:13 }}>{c.productType || '—'}</span></td>
              <td>
                <div style={{ fontSize:13 }}>{c.customerType || '—'}</div>
                <div style={{ fontSize:11.5, color:'var(--text-muted)' }}>{c.billType || '—'}</div>
              </td>
              <td><span style={{ fontSize:12.5, color:'var(--text-2)', whiteSpace:'nowrap' }}>{dl(c.loadPoint)} → {dl(c.unloadPoint)}</span></td>
              <td><span style={{ fontSize:12.5, color:'var(--text-2)', whiteSpace:'nowrap' }}>{c.docDate}</span></td>
              <td>
                {c.owner==='—' ? <span style={{ fontSize:12.5, color:'var(--text-muted)' }}>ยังไม่ระบุ</span> :
                <span style={{ display:'inline-flex', alignItems:'center', gap:7, fontSize:12.5 }}><Avatar name={c.owner} size={24} />{c.owner}</span>}
              </td>
              <td>
                {(!c.ownerCC || c.ownerCC==='—') ? <span style={{ fontSize:12.5, color:'var(--text-muted)' }}>ยังไม่ระบุ</span> :
                <span style={{ display:'inline-flex', alignItems:'center', gap:7, fontSize:12.5 }}><Avatar name={c.ownerCC} size={24} />{c.ownerCC}</span>}
              </td>
              <td>
                {c.confirmed
                  ? (() => {
                      const last = [...c.events].reverse().find(e => e.type === 'status' || e.type === 'confirm');
                      return (
                        <div>
                          <StatusBadge statusKey={c.billStatus} size="sm" />
                          {last && <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:4, whiteSpace:'nowrap' }}>{window.fmtDate(last.at)}</div>}
                        </div>
                      );
                    })()
                  : <span style={{ fontSize:13, color:'var(--text-muted)', fontWeight:500 }}>—</span>}
              </td>
              <td style={{ textAlign:'right' }}>
                {c.billStatus === 'closed'
                  ? <span style={{ fontSize:12.5, color:'var(--text-muted)' }}>—</span>
                  : c.claimAmount != null
                    ? <span style={{ fontWeight:700, fontSize:13.5, fontFeatureSettings:'"tnum"', color:'#34D399' }}>฿{Number(c.claimAmount).toLocaleString('th-TH')}</span>
                    : <span style={{ fontSize:12.5, color:'var(--text-muted)' }}>—</span>}
              </td>
              <td>
                {c.faultDC
                  ? <span style={{ fontSize:12.5, fontWeight:500, color:'var(--text-2)', display:'inline-flex', alignItems:'center', gap:5 }}><Icon name="truck" size={13} style={{ color:'var(--accent-2)', flexShrink:0 }} />{c.faultDC}</span>
                  : <span style={{ fontSize:12.5, color:'var(--text-muted)' }}>—</span>}
              </td>
              <td style={{ textAlign:'right' }} onClick={e=>e.stopPropagation()}>
                <div style={{ display:'inline-flex', gap:7, justifyContent:'flex-end' }}>
                  {!c.confirmed && <Btn variant="primary" size="sm" icon="check" onClick={()=>onConfirm(c)}>ยืนยันรับ</Btn>}
                  <StatusActionMenu c={c} onSetStatus={onSetStatus} onConfirm={onConfirm} onAddStatus={onAddStatus} />
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      {cases.length===0 && <Empty />}
    </div>
  );
}

function CaseGrid({ cases, onOpenCase, onConfirm }) {
  if (!cases.length) return <Empty />;
  return (
    <div className="card-grid">
      {cases.map(c => {
        const s = window.STATUS_MAP[c.billStatus];
        return (
          <div key={c.id} onClick={()=>onOpenCase(c)} className="case-card" style={{ borderTop:`3px solid ${s.color}` }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
              <div style={{ minWidth:0 }}>
                <div style={{ fontWeight:700, fontSize:14.5, fontFeatureSettings:'"tnum"' }}>{c.receiptNo}</div>
                <div style={{ fontSize:11.5, color:'var(--text-muted)', marginTop:2, fontFeatureSettings:'"tnum"' }}>บิล {c.billNo || '—'}</div>
              </div>
              {c.confirmed
                ? <StatusBadge statusKey={c.billStatus} size="sm" />
                : <span style={{ fontSize:12, color:'var(--text-muted)', fontWeight:500, padding:'3px 10px', borderRadius:999, boxShadow:'inset 0 0 0 1px var(--border)' }}>—</span>}
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8, margin:'14px 0 12px' }}>
              <span style={{ width:36, height:36, borderRadius:10, display:'grid', placeItems:'center', background:window.hexA(s.color,.12), color:s.color, flexShrink:0 }}><Icon name="box" size={19} /></span>
              <div style={{ minWidth:0 }}>
                <div style={{ fontSize:13.5, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{dl(c.damageType)}</div>
                <div style={{ fontSize:12, color:'var(--text-muted)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{c.productType || '—'}</div>
              </div>
            </div>
            <div className="card-meta">
              <div><span>ผู้ส่ง</span><b>{c.sender}</b></div>
              <div><span>ผู้รับ</span><b>{c.receiver}</b></div>
              <div><span>เส้นทาง</span><b>{dl(c.loadPoint)} → {dl(c.unloadPoint)}</b></div>
              <div><span>ประเภทลูกค้า</span><b>{c.customerType || '—'}</b></div>
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:14, paddingTop:13, borderTop:'1px solid var(--border)' }} onClick={e=>e.stopPropagation()}>
              <span style={{ fontSize:11.5, color:'var(--text-muted)' }}>{c.docDate}</span>
              {!c.confirmed
                ? <Btn variant="primary" size="sm" icon="check" onClick={()=>onConfirm(c)}>ยืนยันรับ</Btn>
                : <span style={{ display:'inline-flex', alignItems:'center', gap:6, fontSize:12, color:'#34D399', fontWeight:600 }}><Icon name="checkCircle" size={15} />รับเคสแล้ว</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Kanban({ cases, onOpenCase, onConfirm }) {
  const STATUSES = window.STATUSES.filter(s => cases.some(c => c.billStatus === s.key));
  if (!STATUSES.length) return <Empty />;
  return (
    <div className="kanban">
      {STATUSES.map(s => {
        const items = cases.filter(c => c.billStatus === s.key);
        return (
          <div key={s.key} className="kcol">
            <div className="kcol-head" style={{ borderBottom:`2px solid ${s.color}` }}>
              <span style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, fontWeight:700 }}>
                <span style={{ width:9, height:9, borderRadius:3, background:s.color }}></span>{s.label}
              </span>
              <span style={{ fontSize:12, fontWeight:700, color:'var(--text-muted)', background:'var(--surface-3)', padding:'2px 9px', borderRadius:99 }}>{items.length}</span>
            </div>
            <div className="kcol-body">
              {items.map(c => (
                <div key={c.id} onClick={()=>onOpenCase(c)} className="kcard">
                  <div style={{ fontWeight:700, fontSize:13, fontFeatureSettings:'"tnum"' }}>{c.receiptNo}</div>
                  <div style={{ fontSize:12.5, color:'var(--text-2)', margin:'7px 0 9px' }}>{dl(c.damageType)} · {c.productType || '—'}</div>
                  <div style={{ fontSize:11.5, color:'var(--text-muted)', display:'flex', alignItems:'center', gap:4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    <Icon name="truck" size={13} />{c.sender}
                  </div>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:10, paddingTop:9, borderTop:'1px solid var(--border)' }}>
                    <span style={{ fontSize:11.5, color:'var(--text-muted)' }}>{c.docDate}</span>
                    {!c.confirmed
                      ? <button onClick={(e)=>{e.stopPropagation();onConfirm(c);}} className="kconfirm"><Icon name="check" size={13} />ยืนยัน</button>
                      : <Avatar name={c.owner} size={22} />}
                  </div>
                </div>
              ))}
              {!items.length && <div style={{ fontSize:12, color:'var(--text-muted)', textAlign:'center', padding:'20px 0' }}>— ไม่มีเคส —</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Empty() {
  return (
    <div style={{ display:'grid', placeItems:'center', padding:'70px 20px', textAlign:'center', color:'var(--text-muted)' }}>
      <span style={{ width:54, height:54, borderRadius:14, display:'grid', placeItems:'center', background:'var(--surface-2)', marginBottom:14 }}><Icon name="search" size={26} /></span>
      <div style={{ fontSize:15, fontWeight:600, color:'var(--text-2)' }}>ไม่พบเคสที่ตรงเงื่อนไข</div>
      <div style={{ fontSize:13, marginTop:5 }}>ลองปรับตัวกรอง คำค้นหา หรืออัปโหลดไฟล์ Excel ใหม่</div>
    </div>
  );
}

Object.assign(window, { CasesView });
</script>
