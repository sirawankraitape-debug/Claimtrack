                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'var(--text-muted)', marginBottom:3 }}>
                    <span>เกิน 7 วัน</span><span style={{ color:'#F87171', fontWeight:700 }}>{over7} เคส ({Math.round(pct)}%)</span>
                  </div>
                  <div style={{ height:4, background:'var(--surface-3)', borderRadius:99 }}>
                    <div style={{ width:pct+'%', height:'100%', background:'linear-gradient(90deg,#FBBF24,#F87171)', borderRadius:99 }}></div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {countCards.map(({ key, s, grp }) => {
          const isExp = expandKey === key;
          return (
            <div key={key} onClick={() => toggle(key)} style={{
              cursor:'pointer', transition:'all .15s', userSelect:'none',
              background: isExp ? hexA(s.color,.1) : 'var(--surface-2)',
              borderTop:`1px solid ${isExp ? hexA(s.color,.45) : 'var(--border)'}`,
              borderRight:`1px solid ${isExp ? hexA(s.color,.45) : 'var(--border)'}`,
              borderBottom:`1px solid ${isExp ? hexA(s.color,.45) : 'var(--border)'}`,
              borderLeft:`4px solid ${s.color}`, borderRadius:'var(--radius-card)', padding:'14px 16px',
              display:'flex', alignItems:'center', gap:12,
            }}>
              <div style={{ flex:1 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5 }}>
                  <span style={{ width:9, height:9, borderRadius:3, background:s.color }}></span>
                  <span style={{ fontSize:12.5, fontWeight:700, color:'var(--text)' }}>{s.label}</span>
                </div>
                <div style={{ fontSize:11, color:'var(--text-muted)' }}>คลิกเพื่อดูรายเคส</div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:32, fontWeight:800, color:s.color, fontFeatureSettings:'"tnum"', lineHeight:1 }}>{grp.length}</div>
                  <div style={{ fontSize:11.5, color:'var(--text-muted)', marginTop:2 }}>เคส</div>
                </div>
                <ChevIcon active={isExp} color={s.color} />
              </div>
            </div>
          );
        })}
        {unconfirmedGrp.length > 0 && (
          <div onClick={() => toggle('__unconfirmed__')} style={{
            cursor:'pointer', transition:'all .15s', userSelect:'none',
            background: expandKey==='__unconfirmed__' ? hexA('#F59E0B',.1) : 'var(--surface-2)',
            borderTop:`1px solid ${expandKey==='__unconfirmed__' ? hexA('#F59E0B',.45) : 'var(--border)'}`,
            borderRight:`1px solid ${expandKey==='__unconfirmed__' ? hexA('#F59E0B',.45) : 'var(--border)'}`,
            borderBottom:`1px solid ${expandKey==='__unconfirmed__' ? hexA('#F59E0B',.45) : 'var(--border)'}`,
            borderLeft:'4px solid #F59E0B', borderRadius:'var(--radius-card)', padding:'14px 16px',
            display:'flex', alignItems:'center', gap:12,
          }}>
            <div style={{ flex:1 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5 }}>
                <span style={{ width:9, height:9, borderRadius:3, background:'#F59E0B' }}></span>
                <span style={{ fontSize:12.5, fontWeight:700, color:'var(--text)' }}>รอยืนยันรับเคส</span>
              </div>
              <div style={{ fontSize:11, color:'var(--text-muted)' }}>คลิกเพื่อดูรายเคส</div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontSize:32, fontWeight:800, color:'#F59E0B', fontFeatureSettings:'"tnum"', lineHeight:1 }}>{unconfirmedGrp.length}</div>
                <div style={{ fontSize:11.5, color:'var(--text-muted)', marginTop:2 }}>เคส</div>
              </div>
              <ChevIcon active={expandKey==='__unconfirmed__'} color="#F59E0B" />
            </div>
          </div>
        )}
      </div>

      {/* ตารางรายเคสที่ขยาย — เรียงวันค้างมาก→น้อย */}
      {expandKey && expandedCases && (
        <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-card)', background:'var(--surface)', overflow:'hidden', animation:'fade .2s' }}>
          <div style={{ padding:'10px 16px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:8, background:'var(--surface-2)', flexWrap:'wrap' }}>
            <Icon name="list" size={14} style={{ color:'var(--text-muted)', flexShrink:0 }} />
            <span style={{ fontSize:12.5, fontWeight:600, color:'var(--text-2)' }}>
              {expandKey === '__unconfirmed__' ? 'รอยืนยันรับเคส' : (window.STATUS_MAP[expandKey]||{}).label || expandKey}
            </span>
            <span style={{ fontSize:12, color:'var(--text-muted)' }}>· {expandedCases.length} เคส · เรียงจากค้างนานสุด</span>
            <button onClick={e => { e.stopPropagation(); setExpandKey(null); }} style={{ marginLeft:'auto', background:'transparent', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:18, lineHeight:1, padding:'0 4px' }}>✕</button>
          </div>
          <div style={{ overflowX:'auto' }}>
            <table className="ctable" style={{ fontSize:12 }}>
              <thead>
                <tr>
                  <th>เลขที่รับบิล</th>
                  <th>ผู้ส่ง → ผู้รับ</th>
                  <th>สินค้า</th>
                  <th style={{textAlign:'center'}}>วันยืนยันรับ</th>
                  <th style={{textAlign:'center',color:'#FBBF24'}}>ค้างในสถานะ ↓</th>
                  <th style={{textAlign:'center',color:'#F87171'}}>ตั้งแต่ยืนยัน</th>
                  <th style={{textAlign:'right'}}>มูลค่ายืนยัน</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {expandedCases.map(c => {
                  const { daysInStatus, daysFromConfirm, confirmAt } = calcDaysInStatus(c);
                  const dS = daysInStatus!=null ? Math.round(daysInStatus) : null;
                  const dC = daysFromConfirm!=null ? Math.round(daysFromConfirm) : null;
                  return (
                    <tr key={c.id} className="crow" onClick={() => onOpenCase(c)}>
                      <td><div style={{fontWeight:700,fontFeatureSettings:'"tnum"'}}>{c.receiptNo}</div><div style={{fontSize:10.5,color:'var(--text-muted)'}}>{c.billNo||'—'}</div></td>
                      <td><div style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.sender}</div><div style={{fontSize:10.5,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:3}}><Icon name="arrowRight" size={10}/>{c.receiver}</div></td>
                      <td style={{color:'var(--text-2)'}}>{c.productType||'—'}</td>
                      <td style={{textAlign:'center',color:'var(--text-2)',whiteSpace:'nowrap'}}>{confirmAt?window.fmtDate(confirmAt):'—'}</td>
                      <td style={{textAlign:'center'}}>
                        <span style={{fontWeight:800,fontSize:14,color:dc(dS||0),fontFeatureSettings:'"tnum"'}}>{dS!=null?dS:'—'}</span>
                        {dS!=null&&<span style={{fontSize:10,color:'var(--text-muted)',marginLeft:2}}>วัน</span>}
                      </td>
                      <td style={{textAlign:'center'}}>
                        <span style={{fontWeight:800,fontSize:14,color:dc(dC||0),fontFeatureSettings:'"tnum"'}}>{dC!=null?dC:'—'}</span>
                        {dC!=null&&<span style={{fontSize:10,color:'var(--text-muted)',marginLeft:2}}>วัน</span>}
                      </td>
                      <td style={{textAlign:'right'}}>{c.claimAmount!=null?<span style={{fontWeight:700,color:'#34D399',fontFeatureSettings:'"tnum"'}}>฿{Number(c.claimAmount).toLocaleString('th-TH')}</span>:<span style={{color:'var(--text-muted)'}}>—</span>}</td>
                      <td onClick={e=>e.stopPropagation()}><Btn variant="ghost" size="sm" icon="refresh" onClick={() => onOpenCase(c)}>จัดการ</Btn></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function SCDashboard({ cases, onOpenCase, onSetStatus, onConfirm }) {
  const { useMemo: useMCsc, useState: useStateSC } = React;
  const [selectedSC, setSelectedSC] = useStateSC('all');

  // รายชื่อ SC ทั้งหมดที่มีในข้อมูล
  const scList = useMCsc(() => {
    const names = new Set();
    cases.forEach(c => names.add(c.owner && c.owner !== '—' ? c.owner : '—'));
    const arr = [...names].filter(n => n !== '—').sort((a,b) => a.localeCompare(b,'th'));
    if (cases.some(c => !c.owner || c.owner === '—')) arr.push('—');
    return arr;
  }, [cases]);

  // กรองตาม selectedSC
  const filteredScList = selectedSC === 'all' ? scList : scList.filter(n => n === selectedSC);
  const filteredCases  = selectedSC === 'all' ? cases  : cases.filter(c => selectedSC === '—' ? (!c.owner || c.owner === '—') : c.owner === selectedSC);

  // สถิติต่อ SC (ใช้สร้าง card list)
  const scStats = useMCsc(() => scList.map(name => {
    const cs = cases.filter(c => name === '—' ? (!c.owner || c.owner === '—') : c.owner === name);
    const unconfirmed = cs.filter(c => !c.confirmed).length;
    const byStatus = {};
    window.STATUSES.forEach(s => byStatus[s.key] = 0);
    cs.forEach(c => { byStatus[c.billStatus] = (byStatus[c.billStatus]||0)+1; });
    const totalAmt = cs.filter(c => c.claimAmount != null).reduce((s,c) => s+Number(c.claimAmount),0);
    return { name, total: cs.length, unconfirmed, byStatus, totalAmt };
  }), [cases, scList]);

  const fmtAmt = (n) => n > 0 ? '฿'+n.toLocaleString('th-TH') : '—';
  const dlS = window.dispLabel;
  const now = new Date();

  return (
    <div className="page-pad" style={{ display:'flex', flexDirection:'column', gap:20 }}>
      {/* Header */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', flexWrap:'wrap', gap:14 }}>
        <div>
          <div style={{ fontSize:13, color:'var(--accent-2)', fontWeight:600, letterSpacing:'.04em' }}>ผู้รับผิดชอบ</div>
          <h1 style={{ fontFamily:'var(--font-display)', fontSize:26, fontWeight:700, margin:'4px 0 0', letterSpacing:'-0.02em', color:'#EF4444' }}>การจัดการเคส (SC)</h1>
          <div style={{ fontSize:13.5, color:'var(--text-muted)', marginTop:4 }}>แสดงรายเคสแยกตามผู้รับผิดชอบ SC · {filteredCases.length} เคส</div>
        </div>
      </div>

      {/* ===== Filter SC ===== */}
      {scList.length > 0 && (
        <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', padding:'12px 14px', background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:'var(--radius-card)' }}>
          <Icon name="user" size={15} style={{ color:'var(--text-muted)', flexShrink:0 }} />
          <span style={{ fontSize:12.5, fontWeight:600, color:'var(--text-muted)', marginRight:4 }}>กรองตาม SC:</span>
          {['all', ...scList].map(name => {
            const active = selectedSC === name;
            const label  = name === 'all' ? 'ทั้งหมด' : name === '—' ? 'ยังไม่มอบหมาย' : name;
            const count  = name === 'all'
              ? cases.filter(c => !SC_HIDDEN.has(c.billStatus)).length
              : cases.filter(c => (name === '—' ? (!c.owner||c.owner==='—') : c.owner===name) && !SC_HIDDEN.has(c.billStatus)).length;
            return (
              <button key={name} onClick={() => setSelectedSC(name)} style={{
                display:'inline-flex', alignItems:'center', gap:6, padding:'5px 12px', borderRadius:999,
                fontSize:12.5, fontWeight:600, cursor:'pointer', border:'none', fontFamily:'inherit', transition:'all .14s',
                background: active ? 'var(--accent)' : 'var(--surface-3)',
                color:       active ? '#fff' : 'var(--text-2)',
                boxShadow:   active ? '0 3px 10px var(--accent-glow)' : 'inset 0 0 0 1px var(--border)',
              }}>
                {name !== 'all' && <Avatar name={name === '—' ? null : name} size={18} />}
                {label}
                <span style={{ fontSize:11, fontWeight:700, padding:'1px 6px', borderRadius:99,
                  background: active ? 'rgba(255,255,255,.25)' : 'var(--surface-2)', color: active ? '#fff' : 'var(--text-muted)' }}>
                  {count}
                </span>
              </button>
            );
          })}
        </div>
      )}

      {/* ===== การ์ดสรุปค้างจัดการแต่ละสถานะ (กรองตาม selectedSC) ===== */}
      {(() => {
        const now = new Date();
        const visibleCases = filteredCases.filter(c => !SC_HIDDEN.has(c.billStatus) && c.confirmed);

        const detailCards = SC_DETAIL.map(key => {
          const s = window.STATUS_MAP[key]; if (!s) return null;
          const grp = visibleCases.filter(c => c.billStatus === key);
          if (!grp.length) return null;
          const durations = grp.map(c => calcDaysInStatus(c));
          const avgInStatus = durations.reduce((a,d) => a + (d.daysInStatus||0), 0) / grp.length;
          const avgFromConfirm = durations.filter(d=>d.daysFromConfirm!=null).reduce((a,d)=>a+(d.daysFromConfirm||0),0) / Math.max(durations.filter(d=>d.daysFromConfirm!=null).length, 1);
          const maxInStatus = Math.max(...durations.map(d=>d.daysInStatus||0));
          const dayColor = (d) => d > 7 ? '#F87171' : d > 3 ? '#FBBF24' : '#34D399';
          return { key, s, grp, avgInStatus, avgFromConfirm, maxInStatus, type:'detail' };
        }).filter(Boolean);

        const countCards = SC_COUNT_ONLY.map(key => {
          const s = window.STATUS_MAP[key]; if (!s) return null;
          const grp = visibleCases.filter(c => c.billStatus === key);
          if (!grp.length) return null;
          return { key, s, grp, type:'count' };
        }).filter(Boolean);

        const allCards = [...detailCards, ...countCards];
        if (!allCards.length) return null;

        return (
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:'var(--text-muted)', letterSpacing:'.04em', marginBottom:10 }}>สรุปค้างจัดการ · ทุก SC</div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))', gap:12 }}>
              {detailCards.map(({ key, s, grp, avgInStatus, avgFromConfirm, maxInStatus }) => {
                const dc = (d) => d > 7 ? '#F87171' : d > 3 ? '#FBBF24' : '#34D399';
                return (
                  <div key={key} className="stat-card" style={{ background:'var(--surface-2)', border:'1px solid var(--border)', borderLeft:`4px solid ${s.color}`, borderRadius:'var(--radius-card)', padding:'16px 18px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                      <span style={{ width:10, height:10, borderRadius:3, background:s.color, flexShrink:0, boxShadow:`0 0 8px ${hexA(s.color,.6)}` }}></span>
                      <span style={{ fontSize:13, fontWeight:700, color:'var(--text)', flex:1, lineHeight:1.3 }}>{s.label}</span>
                      <span style={{ fontSize:20, fontWeight:800, color:s.color, fontFeatureSettings:'"tnum"' }}>{grp.length}</span>
                      <span style={{ fontSize:12, color:'var(--text-muted)' }}>เคส</span>
                    </div>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                      <div style={{ background:'var(--surface-3)', borderRadius:'var(--radius-sm)', padding:'8px 10px' }}>
                        <div style={{ fontSize:10.5, color:'var(--text-muted)', marginBottom:4, fontWeight:600 }}>เฉลี่ยค้างในสถานะ</div>
                        <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
                          <span style={{ fontSize:22, fontWeight:800, color:dc(avgInStatus), fontFeatureSettings:'"tnum"', lineHeight:1 }}>{Math.round(avgInStatus)}</span>
                          <span style={{ fontSize:12, color:'var(--text-muted)' }}>วัน</span>
                        </div>
                        <div style={{ fontSize:10.5, color:'var(--text-muted)', marginTop:3 }}>สูงสุด {Math.round(maxInStatus)} วัน</div>
                      </div>
                      <div style={{ background:'var(--surface-3)', borderRadius:'var(--radius-sm)', padding:'8px 10px' }}>
                        <div style={{ fontSize:10.5, color:'var(--text-muted)', marginBottom:4, fontWeight:600 }}>เฉลี่ยตั้งแต่ยืนยัน</div>
                        <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
                          <span style={{ fontSize:22, fontWeight:800, color:dc(avgFromConfirm), fontFeatureSettings:'"tnum"', lineHeight:1 }}>{Math.round(avgFromConfirm)}</span>
                          <span style={{ fontSize:12, color:'var(--text-muted)' }}>วัน</span>
                        </div>
                        <div style={{ fontSize:10.5, color:'var(--text-muted)', marginTop:3 }}>นับจากวันยืนยันรับ</div>
                      </div>
                    </div>
                    {/* progress bar แสดงสัดส่วนที่เกิน 7 วัน */}
                    {(() => {
                      const over7 = grp.filter(c => { const d = calcDaysInStatus(c); return (d.daysInStatus||0) > 7; }).length;
                      const pct = grp.length ? over7/grp.length*100 : 0;
                      return over7 > 0 ? (
                        <div style={{ marginTop:10 }}>
                          <div style={{ display:'flex', justifyContent:'space-between', fontSize:10.5, color:'var(--text-muted)', marginBottom:4 }}>
                            <span>เกิน 7 วัน</span><span style={{ color:'#F87171', fontWeight:700 }}>{over7} เคส ({Math.round(pct)}%)</span>
                          </div>
                          <div style={{ height:5, background:'var(--surface-3)', borderRadius:99 }}>
                            <div style={{ width:pct+'%', height:'100%', background:'linear-gradient(90deg,#FBBF24,#F87171)', borderRadius:99 }}></div>
                          </div>
                        </div>
                      ) : null;
                    })()}
                  </div>
                );
              })}
              {countCards.map(({ key, s, grp }) => (
                <div key={key} className="stat-card" style={{ background:'var(--surface-2)', border:'1px solid var(--border)', borderLeft:`4px solid ${s.color}`, borderRadius:'var(--radius-card)', padding:'16px 18px', display:'flex', alignItems:'center', gap:14 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                      <span style={{ width:10, height:10, borderRadius:3, background:s.color }}></span>
                      <span style={{ fontSize:13, fontWeight:700, color:'var(--text)' }}>{s.label}</span>
                    </div>
                    <div style={{ fontSize:12, color:'var(--text-muted)' }}>จำนวนเคสในสถานะนี้</div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <div style={{ fontSize:36, fontWeight:800, color:s.color, fontFeatureSettings:'"tnum"', lineHeight:1 }}>{grp.length}</div>
                    <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:2 }}>เคส</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* ===== การ์ดเคสค้างแยกรายคน SC ===== */}
      {scList.length === 0 ? (
        <div style={{ display:'grid', placeItems:'center', padding:'80px 20px', textAlign:'center', color:'var(--text-muted)' }}>
          <span style={{ width:54, height:54, borderRadius:14, display:'grid', placeItems:'center', background:'var(--surface-2)', marginBottom:14 }}><Icon name="user" size={26}/></span>
          <div style={{ fontSize:15, fontWeight:600, color:'var(--text-2)' }}>ยังไม่มีการมอบหมาย SC</div>
          <div style={{ fontSize:13, marginTop:5 }}>ไปที่เคสเคลมทั้งหมด → กดปุ่ม SC ในแต่ละเคส</div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:24 }}>
          {filteredScList.map(name => {
            const scCases = cases
              .filter(c => name === '—' ? (!c.owner || c.owner === '—') : c.owner === name)
              .filter(c => !SC_HIDDEN.has(c.billStatus));
            if (!scCases.length) return null;
            const totalAmt = scCases.filter(c=>c.claimAmount!=null).reduce((s,c)=>s+Number(c.claimAmount),0);
            const unconfirmed = scCases.filter(c=>!c.confirmed).length;
            return (
              <div key={name}>
                {/* หัว SC คนนี้ */}
                <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12, paddingBottom:12, borderBottom:'2px solid var(--accent)', width:'fit-content', minWidth:240 }}>
                  <Avatar name={name==='—'?null:name} size={40} />
                  <div>
                    <div style={{ fontSize:17, fontWeight:800, color:'var(--text)' }}>{name==='—'?'ยังไม่มอบหมาย':name}</div>
                    <div style={{ fontSize:12.5, color:'var(--text-muted)', marginTop:2, display:'flex', gap:12 }}>
                      <span>{scCases.length} เคสดำเนินการ</span>
                      {unconfirmed>0 && <span style={{ color:'#FBBF24', fontWeight:600 }}>รอยืนยัน {unconfirmed}</span>}
                      {totalAmt>0 && <span style={{ color:'#34D399', fontWeight:600 }}>฿{totalAmt.toLocaleString('th-TH')}</span>}
                    </div>
                  </div>
                </div>
                {/* การ์ดเคสค้างของ SC คนนี้ — คลิกการ์ดเพื่อดูรายเคส */}
                <SCPersonCards scCases={scCases} onOpenCase={onOpenCase} />
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ===================================================================
// หน้าการจัดการเคสแยกตาม CC
// ===================================================================
const CC_DETAIL     = ['new_proof', 'confirm_price', 'sent_owner'];
const CC_COUNT_ONLY = ['received'];
const CC_SHOWN_KEYS = new Set([...CC_DETAIL, ...CC_COUNT_ONLY]);

function CCPersonCards({ ccCases, onOpenCase }) {
  const { useState: usePCC } = React;
  const [expandKey, setExpandKey] = usePCC(null);
  const dc = (d) => d > 7 ? '#F87171' : d > 3 ? '#FBBF24' : '#34D399';

  const confirmedCases = ccCases.filter(c => c.confirmed);

  const detailCards = CC_DETAIL.map(key => {
    const s = window.STATUS_MAP[key]; if (!s) return null;
    const grp = confirmedCases.filter(c => c.billStatus === key);
    if (!grp.length) return null;
    const durs = grp.map(c => calcDaysInStatus(c));
    const avgInStatus = durs.reduce((a,d) => a+(d.daysInStatus||0), 0) / grp.length;
    const maxInStatus = Math.max(...durs.map(d => d.daysInStatus||0));
    return { key, s, grp, avgInStatus, maxInStatus };
  }).filter(Boolean);

  const countCards = CC_COUNT_ONLY.map(key => {
    const s = window.STATUS_MAP[key]; if (!s) return null;
    const grp = ccCases.filter(c => c.billStatus === key);
    if (!grp.length) return null;
    return { key, s, grp };
  }).filter(Boolean);

  if (!detailCards.length && !countCards.length) return (
    <div style={{ fontSize:12.5, color:'var(--text-muted)', padding:'8px 0' }}>ไม่มีเคสค้างดำเนินการ</div>
  );

  const expandedCases = (() => {
    if (!expandKey) return null;
    const card = [...detailCards, ...countCards].find(c => c.key === expandKey);
    const grp = card ? card.grp : null;
    if (!grp || !grp.length) return null;
    return [...grp].sort((a,b) => (calcDaysInStatus(b).daysInStatus||0) - (calcDaysInStatus(a).daysInStatus||0));
  })();
  const toggle = (key) => setExpandKey(prev => prev === key ? null : key);

  const ChevIcon = ({ active, color }) => (
    <span style={{ fontSize:11, color: active ? color : 'var(--text-muted)', lineHeight:1, flexShrink:0, transition:'transform .15s', display:'inline-block', transform: active ? 'rotate(90deg)' : 'rotate(0deg)' }}>▶</span>
  );

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))', gap:12 }}>
        {detailCards.map(({ key, s, grp, avgInStatus, maxInStatus }) => {
          const isExp = expandKey === key;
          const over7 = grp.filter(c => (calcDaysInStatus(c).daysInStatus||0) > 7).length;
          const pct = grp.length ? over7/grp.length*100 : 0;
          return (
            <div key={key} onClick={() => toggle(key)} style={{
              cursor:'pointer', transition:'all .15s', userSelect:'none',
              background: isExp ? hexA(s.color,.1) : 'var(--surface-2)',
              borderTop:`1px solid ${isExp ? hexA(s.color,.45) : 'var(--border)'}`,
              borderRight:`1px solid ${isExp ? hexA(s.color,.45) : 'var(--border)'}`,
              borderBottom:`1px solid ${isExp ? hexA(s.color,.45) : 'var(--border)'}`,
              borderLeft:`4px solid ${s.color}`, borderRadius:'var(--radius-card)', padding:'14px 16px',
              boxShadow: isExp ? `0 0 0 2px ${hexA(s.color,.2)}` : 'none',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
                <span style={{ width:9, height:9, borderRadius:3, background:s.color, flexShrink:0, boxShadow:`0 0 8px ${hexA(s.color,.6)}` }}></span>
                <span style={{ fontSize:12.5, fontWeight:700, color:'var(--text)', flex:1, lineHeight:1.3 }}>{s.label}</span>
                <span style={{ fontSize:18, fontWeight:800, color:s.color, fontFeatureSettings:'"tnum"' }}>{grp.length}</span>
                <span style={{ fontSize:11.5, color:'var(--text-muted)', marginRight:4 }}>เคส</span>
                <ChevIcon active={isExp} color={s.color} />
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:7 }}>
                <div style={{ background:'var(--surface-3)', borderRadius:'var(--radius-sm)', padding:'7px 9px' }}>
                  <div style={{ fontSize:10, color:'var(--text-muted)', marginBottom:3, fontWeight:600 }}>ค้างนานสุด</div>
                  <div style={{ display:'flex', alignItems:'baseline', gap:3 }}>
                    <span style={{ fontSize:20, fontWeight:800, color:dc(maxInStatus), fontFeatureSettings:'"tnum"', lineHeight:1 }}>{Math.round(maxInStatus)}</span>
                    <span style={{ fontSize:11, color:'var(--text-muted)' }}>วัน</span>
                  </div>
                </div>
                <div style={{ background:'var(--surface-3)', borderRadius:'var(--radius-sm)', padding:'7px 9px' }}>
                  <div style={{ fontSize:10, color:'var(--text-muted)', marginBottom:3, fontWeight:600 }}>เฉลี่ยค้าง</div>
                  <div style={{ display:'flex', alignItems:'baseline', gap:3 }}>
                    <span style={{ fontSize:20, fontWeight:800, color:dc(avgInStatus), fontFeatureSettings:'"tnum"', lineHeight:1 }}>{Math.round(avgInStatus)}</span>
                    <span style={{ fontSize:11, color:'var(--text-muted)' }}>วัน</span>
                  </div>
                </div>
              </div>
              {over7 > 0 && (
                <div style={{ marginTop:9 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'var(--text-muted)', marginBottom:3 }}>
                    <span>เกิน 7 วัน</span><span style={{ color:'#F87171', fontWeight:700 }}>{over7} เคส ({Math.round(pct)}%)</span>
                  </div>
                  <div style={{ height:4, background:'var(--surface-3)', borderRadius:99 }}>
                    <div style={{ width:pct+'%', height:'100%', background:'linear-gradient(90deg,#FBBF24,#F87171)', borderRadius:99 }}></div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {countCards.map(({ key, s, grp }) => {
          const isExp = expandKey === key;
          return (
            <div key={key} onClick={() => toggle(key)} style={{
              cursor:'pointer', transition:'all .15s', userSelect:'none',
              background: isExp ? hexA(s.color,.1) : 'var(--surface-2)',
              borderTop:`1px solid ${isExp ? hexA(s.color,.45) : 'var(--border)'}`,
              borderRight:`1px solid ${isExp ? hexA(s.color,.45) : 'var(--border)'}`,
              borderBottom:`1px solid ${isExp ? hexA(s.color,.45) : 'var(--border)'}`,
              borderLeft:`4px solid ${s.color}`, borderRadius:'var(--radius-card)', padding:'14px 16px',
              display:'flex', alignItems:'center', gap:12,
            }}>
              <div style={{ flex:1 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5 }}>
                  <span style={{ width:9, height:9, borderRadius:3, background:s.color }}></span>
                  <span style={{ fontSize:12.5, fontWeight:700, color:'var(--text)' }}>{s.label}</span>
                </div>
                <div style={{ fontSize:11, color:'var(--text-muted)' }}>คลิกเพื่อดูรายเคส</div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:32, fontWeight:800, color:s.color, fontFeatureSettings:'"tnum"', lineHeight:1 }}>{grp.length}</div>
                  <div style={{ fontSize:11.5, color:'var(--text-muted)', marginTop:2 }}>เคส</div>
                </div>
                <ChevIcon active={isExp} color={s.color} />
              </div>
            </div>
          );
        })}
      </div>

      {expandKey && expandedCases && (
        <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-card)', background:'var(--surface)', overflow:'hidden', animation:'fade .2s' }}>
          <div style={{ padding:'10px 16px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:8, background:'var(--surface-2)', flexWrap:'wrap' }}>
            <Icon name="list" size={14} style={{ color:'var(--text-muted)', flexShrink:0 }} />
            <span style={{ fontSize:12.5, fontWeight:600, color:'var(--text-2)' }}>
              {(window.STATUS_MAP[expandKey]||{}).label || expandKey}
            </span>
            <span style={{ fontSize:12, color:'var(--text-muted)' }}>· {expandedCases.length} เคส · เรียงจากค้างนานสุด</span>
            <button onClick={e => { e.stopPropagation(); setExpandKey(null); }} style={{ marginLeft:'auto', background:'transparent', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:18, lineHeight:1, padding:'0 4px' }}>✕</button>
          </div>
          <div style={{ overflowX:'auto' }}>
            <table className="ctable" style={{ fontSize:12 }}>
              <thead>
                <tr>
                  <th>เลขที่รับบิล</th>
                  <th>ผู้ส่ง → ผู้รับ</th>
                  <th>สินค้า</th>
                  <th style={{textAlign:'center',color:'#FBBF24'}}>ค้างในสถานะ ↓</th>
                  <th style={{textAlign:'right'}}>มูลค่ายืนยัน</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {expandedCases.map(c => {
                  const { daysInStatus } = calcDaysInStatus(c);
                  const dS = daysInStatus!=null ? Math.round(daysInStatus) : null;
                  const dColor = dS!=null ? dc(dS) : 'var(--text-muted)';
                  return (
                    <tr key={c.id} className="crow" onClick={() => onOpenCase(c)}>
                      <td><div style={{fontWeight:700,fontFeatureSettings:'"tnum"'}}>{c.receiptNo}</div><div style={{fontSize:10.5,color:'var(--text-muted)'}}>{c.billNo||'—'}</div></td>
                      <td><div style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.sender}</div><div style={{fontSize:10.5,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:3}}><Icon name="arrowRight" size={10}/>{c.receiver}</div></td>
                      <td style={{color:'var(--text-2)'}}>{c.productType||'—'}</td>
                      <td style={{textAlign:'center'}}>
                        <span style={{fontWeight:800,fontSize:14,color:dColor,fontFeatureSettings:'"tnum"'}}>{dS!=null?dS:'—'}</span>
                        {dS!=null&&<span style={{fontSize:10,color:'var(--text-muted)',marginLeft:2}}>วัน</span>}
                      </td>
                      <td style={{textAlign:'right'}}>{c.claimAmount!=null?<span style={{fontWeight:700,color:'#34D399',fontFeatureSettings:'"tnum"'}}>฿{Number(c.claimAmount).toLocaleString('th-TH')}</span>:<span style={{color:'var(--text-muted)'}}>—</span>}</td>
                      <td onClick={e=>e.stopPropagation()}><Btn variant="ghost" size="sm" icon="refresh" onClick={() => onOpenCase(c)}>จัดการ</Btn></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function CCDashboard({ cases, onOpenCase, onSetStatus, onConfirm }) {
  const { useMemo: useMCcc, useState: useStateCcc } = React;
  const [selectedCC, setSelectedCC] = useStateCcc('all');

  const ccList = useMCcc(() => {
    const names = new Set();
    cases.forEach(c => names.add(c.ownerCC && c.ownerCC !== '—' ? c.ownerCC : '—'));
    const arr = [...names].filter(n => n !== '—').sort((a,b) => a.localeCompare(b,'th'));
    if (cases.some(c => !c.ownerCC || c.ownerCC === '—')) arr.push('—');
    return arr;
  }, [cases]);

  const filteredCases = useMCcc(() => {
    if (selectedCC === 'all') return cases;
    if (selectedCC === '—') return cases.filter(c => !c.ownerCC || c.ownerCC === '—');
    return cases.filter(c => c.ownerCC === selectedCC);
  }, [cases, selectedCC]);

  const displayList = useMCcc(() => {
    if (selectedCC === 'all') return ccList;
    return ccList.filter(n => n === selectedCC);
  }, [ccList, selectedCC]);

  return (
    <div className="page-pad" style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', flexWrap:'wrap', gap:14 }}>
        <div>
          <div style={{ fontSize:13, color:'var(--accent-2)', fontWeight:600, letterSpacing:'.04em' }}>ผู้รับผิดชอบ</div>
          <h1 style={{ fontFamily:'var(--font-display)', fontSize:26, fontWeight:700, margin:'4px 0 0', letterSpacing:'-0.02em', color:'#EF4444' }}>การจัดการเคส (CC)</h1>
          <div style={{ fontSize:13.5, color:'var(--text-muted)', marginTop:4 }}>
            แสดงรายเคสแยกตามผู้รับผิดชอบ CC ·{' '}
            {selectedCC === 'all' ? `${cases.length} เคสรวม` : `${filteredCases.length} เคส (กรองแล้ว)`}
          </div>
        </div>
        {/* ===== ตัวกรองรายชื่อ CC ===== */}
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <Icon name="user" size={16} style={{ color:'var(--text-muted)', flexShrink:0 }} />
          <select
            value={selectedCC}
            onChange={e => setSelectedCC(e.target.value)}
            style={{
              background:'var(--bg-2)', border:'1px solid var(--border)',
              borderRadius:'var(--radius-sm)', fontSize:13.5, fontWeight:600,
              padding:'8px 14px', fontFamily:'inherit', cursor:'pointer', outline:'none',
              color: selectedCC !== 'all' ? 'var(--accent-2)' : 'var(--text-2)',
              boxShadow: selectedCC !== 'all' ? 'inset 0 0 0 1.5px var(--accent)' : 'none',
            }}>
            <option value="all">CC ทั้งหมด</option>
            {ccList.filter(n => n !== '—').map(n => <option key={n} value={n}>{n}</option>)}
            {ccList.includes('—') && <option value="—">ยังไม่มอบหมาย</option>}
          </select>
          {selectedCC !== 'all' && (
            <button onClick={() => setSelectedCC('all')} style={{ background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', display:'grid', placeItems:'center', padding:4, borderRadius:6 }} title="ล้างตัวกรอง">
              <Icon name="close" size={15} />
            </button>
          )}
        </div>
      </div>

      {/* ===== การ์ดสรุปค้างจัดการแต่ละสถานะ (ทุก CC รวม) ===== */}
      {(() => {
        const visibleCases = filteredCases.filter(c => CC_SHOWN_KEYS.has(c.billStatus) && c.confirmed);

        const detailCards = CC_DETAIL.map(key => {
          const s = window.STATUS_MAP[key]; if (!s) return null;
          const grp = visibleCases.filter(c => c.billStatus === key);
          if (!grp.length) return null;
          const durations = grp.map(c => calcDaysInStatus(c));
          const avgInStatus = durations.reduce((a,d) => a+(d.daysInStatus||0), 0) / grp.length;
          const maxInStatus = Math.max(...durations.map(d => d.daysInStatus||0));
          return { key, s, grp, avgInStatus, maxInStatus };
        }).filter(Boolean);

        const countCards = CC_COUNT_ONLY.map(key => {
          const s = window.STATUS_MAP[key]; if (!s) return null;
          const grp = visibleCases.filter(c => c.billStatus === key);
          if (!grp.length) return null;
          return { key, s, grp };
        }).filter(Boolean);

        const allCards = [...detailCards, ...countCards];
        if (!allCards.length) return null;
        const dc = (d) => d > 7 ? '#F87171' : d > 3 ? '#FBBF24' : '#34D399';

        return (
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:'var(--text-muted)', letterSpacing:'.04em', marginBottom:10 }}>สรุปค้างจัดการ · {selectedCC === 'all' ? 'ทุก CC' : selectedCC === '—' ? 'ยังไม่มอบหมาย' : selectedCC}</div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))', gap:12 }}>
              {detailCards.map(({ key, s, grp, avgInStatus, maxInStatus }) => (
                <div key={key} className="stat-card" style={{ background:'var(--surface-2)', border:'1px solid var(--border)', borderLeft:`4px solid ${s.color}`, borderRadius:'var(--radius-card)', padding:'16px 18px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                    <span style={{ width:10, height:10, borderRadius:3, background:s.color, flexShrink:0, boxShadow:`0 0 8px ${hexA(s.color,.6)}` }}></span>
                    <span style={{ fontSize:13, fontWeight:700, color:'var(--text)', flex:1, lineHeight:1.3 }}>{s.label}</span>
                    <span style={{ fontSize:20, fontWeight:800, color:s.color, fontFeatureSettings:'"tnum"' }}>{grp.length}</span>
                    <span style={{ fontSize:12, color:'var(--text-muted)' }}>เคส</span>
                  </div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                    <div style={{ background:'var(--surface-3)', borderRadius:'var(--radius-sm)', padding:'8px 10px' }}>
                      <div style={{ fontSize:10.5, color:'var(--text-muted)', marginBottom:4, fontWeight:600 }}>ค้างนานสุด</div>
                      <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
                        <span style={{ fontSize:22, fontWeight:800, color:dc(maxInStatus), fontFeatureSettings:'"tnum"', lineHeight:1 }}>{Math.round(maxInStatus)}</span>
                        <span style={{ fontSize:12, color:'var(--text-muted)' }}>วัน</span>
                      </div>
                    </div>
                    <div style={{ background:'var(--surface-3)', borderRadius:'var(--radius-sm)', padding:'8px 10px' }}>
                      <div style={{ fontSize:10.5, color:'var(--text-muted)', marginBottom:4, fontWeight:600 }}>เฉลี่ยค้าง</div>
                      <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
                        <span style={{ fontSize:22, fontWeight:800, color:dc(avgInStatus), fontFeatureSettings:'"tnum"', lineHeight:1 }}>{Math.round(avgInStatus)}</span>
                        <span style={{ fontSize:12, color:'var(--text-muted)' }}>วัน</span>
                      </div>
                    </div>
                  </div>
                  {(() => {
                    const over7 = grp.filter(c => { const d = calcDaysInStatus(c); return (d.daysInStatus||0) > 7; }).length;
                    const pct = grp.length ? over7/grp.length*100 : 0;
                    return over7 > 0 ? (
                      <div style={{ marginTop:10 }}>
                        <div style={{ display:'flex', justifyContent:'space-between', fontSize:10.5, color:'var(--text-muted)', marginBottom:4 }}>
                          <span>เกิน 7 วัน</span><span style={{ color:'#F87171', fontWeight:700 }}>{over7} เคส ({Math.round(pct)}%)</span>
                        </div>
                        <div style={{ height:5, background:'var(--surface-3)', borderRadius:99 }}>
                          <div style={{ width:pct+'%', height:'100%', background:'linear-gradient(90deg,#FBBF24,#F87171)', borderRadius:99 }}></div>
                        </div>
                      </div>
                    ) : null;
                  })()}
                </div>
              ))}
              {countCards.map(({ key, s, grp }) => (
                <div key={key} className="stat-card" style={{ background:'var(--surface-2)', border:'1px solid var(--border)', borderLeft:`4px solid ${s.color}`, borderRadius:'var(--radius-card)', padding:'16px 18px', display:'flex', alignItems:'center', gap:14 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                      <span style={{ width:10, height:10, borderRadius:3, background:s.color }}></span>
                      <span style={{ fontSize:13, fontWeight:700, color:'var(--text)' }}>{s.label}</span>
                    </div>
                    <div style={{ fontSize:12, color:'var(--text-muted)' }}>จำนวนเคสในสถานะนี้</div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <div style={{ fontSize:36, fontWeight:800, color:s.color, fontFeatureSettings:'"tnum"', lineHeight:1 }}>{grp.length}</div>
                    <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:2 }}>เคส</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* ===== การ์ดเคสค้างแยกรายคน CC ===== */}
      {ccList.length === 0 ? (
        <div style={{ display:'grid', placeItems:'center', padding:'80px 20px', textAlign:'center', color:'var(--text-muted)' }}>
          <span style={{ width:54, height:54, borderRadius:14, display:'grid', placeItems:'center', background:'var(--surface-2)', marginBottom:14 }}><Icon name="user" size={26}/></span>
          <div style={{ fontSize:15, fontWeight:600, color:'var(--text-2)' }}>ยังไม่มีการมอบหมาย CC</div>
          <div style={{ fontSize:13, marginTop:5 }}>ไปที่เคสเคลมทั้งหมด → กดปุ่ม CC ในแต่ละเคส</div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:24 }}>
          {displayList.map(name => {
            const ccCases = filteredCases
              .filter(c => name === '—' ? (!c.ownerCC || c.ownerCC === '—') : c.ownerCC === name)
              .filter(c => CC_SHOWN_KEYS.has(c.billStatus));
            if (!ccCases.length) return null;
            const totalAmt = ccCases.filter(c=>c.claimAmount!=null).reduce((s,c)=>s+Number(c.claimAmount),0);
            return (
              <div key={name}>
                <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12, paddingBottom:12, borderBottom:'2px solid var(--accent)', width:'fit-content', minWidth:240 }}>
                  <Avatar name={name==='—'?null:name} size={40} />
                  <div>
                    <div style={{ fontSize:17, fontWeight:800, color:'var(--text)' }}>{name==='—'?'ยังไม่มอบหมาย':name}</div>
                    <div style={{ fontSize:12.5, color:'var(--text-muted)', marginTop:2, display:'flex', gap:12 }}>
                      <span>{ccCases.length} เคสดำเนินการ</span>
                      {totalAmt>0 && <span style={{ color:'#34D399', fontWeight:600 }}>฿{totalAmt.toLocaleString('th-TH')}</span>}
                    </div>
                  </div>
                </div>
                <CCPersonCards ccCases={ccCases} onOpenCase={onOpenCase} />
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ===================================================================
// หน้าเคสขอพิจารณาลงบริษัท (consider_co)
// ===================================================================
function ConsiderCoView({ cases, onOpenCase, onConfirm, onSetStatus, onAddStatus, onSetConsiderCoResult }) {
  const { useState: useStateCC2, useMemo: useMemoCC2 } = React;
  const [q, setQ] = useStateCC2('');
  const STATUS = window.STATUS_MAP['consider_co'];
  const COLOR = STATUS ? STATUS.color : '#EC4899';

  const filtered = useMemoCC2(() => {
    const base = cases.filter(c => c.billStatus === 'consider_co');
    if (!q) return base;
    const lower = q.toLowerCase();
    return base.filter(c => {
      const hay = `${c.receiptNo} ${c.billNo} ${c.sender} ${c.receiver} ${c.productType} ${c.damageType} ${c.loadPoint} ${c.unloadPoint} ${c.owner} ${c.ownerCC} ${c.faultDC}`.toLowerCase();
      return hay.includes(lower);
    });
  }, [cases, q]);

  const totalAmt = useMemoCC2(() =>
    filtered.filter(c => c.claimAmount != null).reduce((s,c) => s + Number(c.claimAmount), 0),
  [filtered]);

  const pendingCount  = filtered.filter(c => !c.considerCoResult || c.considerCoResult === 'pending').length;
  const approvedCount = filtered.filter(c => c.considerCoResult === 'approved').length;
  const rejectedCount = filtered.filter(c => c.considerCoResult === 'rejected').length;

  const dl = window.dispLabel;
  const dc = (d) => d > 7 ? '#F87171' : d > 3 ? '#FBBF24' : '#34D399';

  // คำนวณวันค้างในสถานะ consider_co
  const getDaysInStatus = (c) => {
    const evs = [...(c.events||[])].sort((a,b) => new Date(a.at)-new Date(b.at));
    let entryDate = null;
    let cur = 'received';
    evs.forEach(e => {
      if (e.type === 'status') {
        const m = e.text.match(/"([^"]+)"/);
        if (m) {
          const found = window.STATUSES.find(s => s.label === m[1]);
          if (found) {
            if (found.key === 'consider_co') entryDate = new Date(e.at);
            cur = found.key;
          }
        }
      }
    });
    if (!entryDate && c.billStatus === 'consider_co') {
      entryDate = evs[0] ? new Date(evs[0].at) : null;
    }
    return entryDate ? Math.max(0, Math.round((new Date() - entryDate) / 86400000)) : null;
  };

  return (
    <div className="page-pad" style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {/* Header */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', flexWrap:'wrap', gap:14 }}>
        <div>
          <div style={{ fontSize:13, color: COLOR, fontWeight:600, letterSpacing:'.04em' }}>สถานะพิเศษ</div>
          <h1 style={{ fontFamily:'var(--font-display)', fontSize:26, fontWeight:700, margin:'4px 0 0', letterSpacing:'-0.02em', color:'#EF4444' }}>เคสขอพิจารณาลงบริษัท</h1>
          <div style={{ fontSize:13.5, color:'var(--text-muted)', marginTop:4 }}>
            เคสที่อยู่ระหว่างขอให้บริษัทพิจารณาร่วมรับผิดชอบค่าเสียหาย
          </div>
        </div>
      </div>

      {/* KPI Cards */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))', gap:14 }}>
        {[
          { label:'เคสทั้งหมด',              value: filtered.length,                                         icon:'box',         color: COLOR      },
          { label:'อยู่ระหว่างขออนุมัติ',   value: pendingCount,                                             icon:'clock',       color:'#F59E0B'   },
          { label:'อนุมัติ',                 value: approvedCount,                                            icon:'checkCircle', color:'#10B981'   },
          { label:'ไม่อนุมัติ',              value: rejectedCount,                                            icon:'alert',       color:'#EF4444'   },
          { label:'มูลค่ารวม',               value: totalAmt > 0 ? '฿'+totalAmt.toLocaleString('th-TH'):'—', icon:'note',        color:'#34D399'   },
        ].map(({ label, value, icon, color }) => (
          <div key={label} className="stat-card" style={{ background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:'var(--radius-card)', padding:'16px 18px', position:'relative', overflow:'hidden' }}>
            <div style={{ position:'absolute', inset:0, background:`radial-gradient(120% 120% at 100% 0%, ${hexA(color,.1)}, transparent 55%)`, pointerEvents:'none' }}></div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', position:'relative' }}>
              <div style={{ fontSize:12.5, color:'var(--text-muted)', fontWeight:500 }}>{label}</div>
              <span style={{ width:30, height:30, borderRadius:9, display:'grid', placeItems:'center', color, background:hexA(color,.12) }}><Icon name={icon} size={16} /></span>
            </div>
            <div style={{ fontSize:24, fontWeight:800, color:'var(--text)', marginTop:8, position:'relative', fontFeatureSettings:'"tnum"', letterSpacing:'-0.02em' }}>{value}</div>
          </div>
        ))}
      </div>

      {/* Search */}
      <div className="toolbar">
        <div className="search-box">
          <Icon name="search" size={17} style={{ color:'var(--text-muted)', flexShrink:0 }} />
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="ค้นหาเลขรับบิล, เลขบิล, บริษัท, สินค้า, DC..." />
          {q && <button onClick={() => setQ('')} style={{ background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', display:'grid', placeItems:'center' }}><Icon name="close" size={15} /></button>}
        </div>
        <div style={{ marginLeft:'auto', fontSize:13, color:'var(--text-muted)' }}>
          พบ <b style={{ color:'var(--text)' }}>{filtered.length}</b> เคส
        </div>
      </div>

      {/* Table */}
      <div className="table-wrap">
        <table className="ctable">
          <thead>
            <tr>
              <th>เลขที่รับบิล / เลขที่บิล</th>
              <th>ความเสียหาย</th>
              <th>ผู้ส่ง → ผู้รับ</th>
              <th>สินค้า</th>
              <th>เส้นทาง (จุดขึ้น → จุดลง)</th>
              <th>วันที่เอกสาร</th>
              <th>SC</th>
              <th>CC</th>
              <th style={{textAlign:'center',color:'#FBBF24'}}>ค้างในสถานะ</th>
              <th style={{textAlign:'center'}}>ผลพิจารณา</th>
              <th style={{textAlign:'right'}}>มูลค่ายืนยันเคลม</th>
              <th>DC/หน่วยงาน ที่เสียหาย</th>
              <th style={{textAlign:'right'}}>จัดการ</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(c => {
              const days = getDaysInStatus(c);
              return (
                <tr key={c.id} onClick={() => onOpenCase(c)} className="crow">
                  <td>
                    <div style={{ fontWeight:700, fontSize:13.5, fontFeatureSettings:'"tnum"' }}>{c.receiptNo}</div>
                    <div style={{ fontSize:11.5, color:'var(--text-muted)', fontFeatureSettings:'"tnum"' }}>{c.billNo||'—'}</div>
                    {!c.confirmed && (
                      <span style={{ fontSize:10.5, fontWeight:700, color:'#F59E0B', background:hexA('#F59E0B',.12), padding:'1px 6px', borderRadius:99, marginTop:3, display:'inline-block' }}>รอยืนยัน</span>
                    )}
                  </td>
                  <td><span style={{ fontSize:13, color:'var(--text-2)' }}>{dl(c.damageType)}</span></td>
                  <td>
                    <div style={{ fontSize:13, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:160 }}>{c.sender}</div>
                    <div style={{ fontSize:11.5, color:'var(--text-muted)', display:'flex', alignItems:'center', gap:4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:160 }}><Icon name="arrowRight" size={11}/>{c.receiver}</div>
                  </td>
                  <td><span style={{ fontSize:13 }}>{c.productType||'—'}</span></td>
                  <td><span style={{ fontSize:12.5, color:'var(--text-2)', whiteSpace:'nowrap' }}>{dl(c.loadPoint)} → {dl(c.unloadPoint)}</span></td>
                  <td><span style={{ fontSize:12.5, color:'var(--text-2)', whiteSpace:'nowrap' }}>{c.docDate}</span></td>
                  <td>
                    {c.owner==='—'||!c.owner
                      ? <span style={{ fontSize:12, color:'var(--text-muted)' }}>—</span>
                      : <span style={{ display:'inline-flex', alignItems:'center', gap:6, fontSize:12.5 }}><Avatar name={c.owner} size={22}/>{c.owner}</span>}
                  </td>
                  <td>
                    {!c.ownerCC||c.ownerCC==='—'
                      ? <span style={{ fontSize:12, color:'var(--text-muted)' }}>—</span>
                      : <span style={{ display:'inline-flex', alignItems:'center', gap:6, fontSize:12.5 }}><Avatar name={c.ownerCC} size={22}/>{c.ownerCC}</span>}
                  </td>
                  <td style={{ textAlign:'center' }}>
                    {days != null
                      ? <><span style={{ fontWeight:800, fontSize:15, color:dc(days), fontFeatureSettings:'"tnum"' }}>{days}</span><span style={{ fontSize:10.5, color:'var(--text-muted)', marginLeft:3 }}>วัน</span></>
                      : <span style={{ color:'var(--text-muted)' }}>—</span>}
                  </td>
                  <td style={{ textAlign:'center' }} onClick={e => e.stopPropagation()}>
                    {(() => {
                      const r = c.considerCoResult;
                      const OPTS = [
                        { val: null,       label:'อยู่ระหว่าง', color:'#F59E0B' },
                        { val:'approved',  label:'อนุมัติ',      color:'#10B981' },
                        { val:'rejected',  label:'ไม่อนุมัติ',   color:'#EF4444' },
                      ];
                      const cur = OPTS.find(o => o.val === (r||null)) || OPTS[0];
                      return (
                        <select
                          value={r||''}
                          onChange={e => onSetConsiderCoResult && onSetConsiderCoResult(c, e.target.value || null)}
                          style={{ appearance:'none', WebkitAppearance:'none', background:hexA(cur.color,.13), border:`1px solid ${hexA(cur.color,.35)}`, borderRadius:99, color:cur.color, fontSize:12, fontWeight:700, padding:'4px 10px', fontFamily:'inherit', cursor:'pointer', outline:'none', textAlign:'center' }}
                          onClick={e => e.stopPropagation()}>
                          <option value="">อยู่ระหว่าง</option>
                          <option value="approved">อนุมัติ</option>
                          <option value="rejected">ไม่อนุมัติ</option>
                        </select>
                      );
                    })()}
                  </td>
                  <td style={{ textAlign:'right' }}>
                    {c.claimAmount != null
                      ? <span style={{ fontWeight:700, fontSize:13.5, fontFeatureSettings:'"tnum"', color:'#34D399' }}>฿{Number(c.claimAmount).toLocaleString('th-TH')}</span>
                      : <span style={{ fontSize:12.5, color:'var(--text-muted)' }}>—</span>}
                  </td>
                  <td>
                    {c.faultDC
                      ? <span style={{ fontSize:12.5, fontWeight:500, color:'var(--text-2)', display:'inline-flex', alignItems:'center', gap:5 }}><Icon name="truck" size={13} style={{ color:'var(--accent-2)', flexShrink:0 }}/>{c.faultDC}</span>
                      : <span style={{ fontSize:12.5, color:'var(--text-muted)' }}>—</span>}
                  </td>
                  <td style={{ textAlign:'right' }} onClick={e => e.stopPropagation()}>
                    <div style={{ display:'inline-flex', gap:7, justifyContent:'flex-end' }}>
                      {!c.confirmed && <Btn variant="primary" size="sm" icon="check" onClick={() => onConfirm(c)}>ยืนยันรับ</Btn>}
                      <StatusActionMenu c={c} onSetStatus={onSetStatus} onConfirm={onConfirm} onAddStatus={onAddStatus} />
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length === 0 && (
          <div style={{ display:'grid', placeItems:'center', padding:'70px 20px', textAlign:'center', color:'var(--text-muted)' }}>
            <span style={{ width:54, height:54, borderRadius:14, display:'grid', placeItems:'center', background:'var(--surface-2)', marginBottom:14 }}><Icon name="layers" size={26}/></span>
            <div style={{ fontSize:15, fontWeight:600, color:'var(--text-2)' }}>ไม่มีเคสขอพิจารณาลงบริษัทในขณะนี้</div>
            <div style={{ fontSize:13, marginTop:5 }}>เคสจะปรากฏที่นี่เมื่อมีการเปลี่ยนสถานะเป็น "ขอพิจารณาลงบริษัท"</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ===== หน้าตั้งค่า: ฐานข้อมูล + จัดการสถานะ =====
function StatusSettings({ cases, statuses, onAddStatus, onBackup, onRestore, onReset, dbStats }) {
  const sum = window.summarize(cases);
  const groups = window.groupedStatuses();
  const isServer = !!dbStats.isServer;
  const lsTotal = isServer ? 0 : (dbStats.caseKB||0) + (dbStats.statusKB||0);
  return (
    <div className="page-pad" style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <div>
        <div style={{ fontSize:13, color:'var(--accent-2)', fontWeight:600, letterSpacing:'.04em' }}>ตั้งค่าระบบ</div>
        <h1 style={{ fontFamily:'var(--font-display)', fontSize:26, fontWeight:700, margin:'4px 0 0', letterSpacing:'-0.02em' }}>ฐานข้อมูล & สถานะ</h1>
      </div>

      {/* ===== แผง Database ===== */}
      <div className="panel">
        <div className="panel-head">
          <div>
            <h3 className="panel-title">{isServer ? 'ฐานข้อมูล (SQLite — Server Mode)' : 'ฐานข้อมูล (localStorage)'}</h3>
            <div style={{ fontSize:12.5, color:'var(--text-muted)', marginTop:3 }}>
              {isServer
                ? 'ข้อมูลเก็บใน SQLite บน server — ใช้ร่วมกันได้ทุกเครื่อง sync แบบ real-time'
                : 'บันทึกอัตโนมัติในเบราว์เซอร์ — ข้อมูลคงอยู่แม้รีเฟรชหรือปิด/เปิดใหม่'}
            </div>
          </div>
          <span style={{ display:'flex', alignItems:'center', gap:6, fontSize:12.5, color: isServer ? '#34D399' : '#F59E0B', fontWeight:600, background:window.hexA(isServer ? '#10B981' : '#F59E0B',.12), padding:'5px 12px', borderRadius:99, whiteSpace:'nowrap' }}>
            <span style={{ width:7, height:7, borderRadius:99, background: isServer ? '#34D399' : '#F59E0B', boxShadow:`0 0 8px ${isServer ? '#34D399' : '#F59E0B'}` }}></span>
            {isServer ? 'Server Mode (SQLite)' : 'Local Mode (localStorage)'}
          </span>
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))', gap:14, marginTop:16 }}>
          {(isServer ? [
            ['box','เคสเคลม', cases.length + ' รายการ', '#6366F1'],
            ['layers','สถานะ', statuses.length + ' สถานะ', '#14B8A6'],
            ['wifi','Real-time Sync', 'SSE เปิดอยู่', '#10B981'],
          ] : [
            ['box','เคสเคลม', cases.length + ' รายการ', '#6366F1'],
            ['layers','สถานะ', statuses.length + ' สถานะ', '#14B8A6'],
            ['file','ขนาดข้อมูล', lsTotal + ' KB', '#F59E0B'],
          ]).map(([ic,lbl,val,col]) => (
            <div key={lbl} style={{ background:'var(--surface-3)', borderRadius:'var(--radius-sm)', padding:'12px 14px' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                <span style={{ color:col }}><Icon name={ic} size={16} /></span>
                <span style={{ fontSize:12, color:'var(--text-muted)' }}>{lbl}</span>
              </div>
              <div style={{ fontSize:20, fontWeight:700, fontFeatureSettings:'"tnum"' }}>{val}</div>
            </div>
          ))}
        </div>

        <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginTop:18, paddingTop:16, borderTop:'1px solid var(--border)' }}>
          <Btn variant="solid" icon="download" onClick={onBackup}>สำรองข้อมูล (.json)</Btn>
          <Btn variant="solid" icon="upload" onClick={onRestore}>กู้คืนจากไฟล์ .json</Btn>
          <Btn variant="danger" icon="close" onClick={onReset}>ล้างข้อมูลเคส</Btn>
        </div>

        <div style={{ marginTop:16, padding:'12px 14px', background:'var(--surface-3)', borderRadius:'var(--radius-sm)', fontSize:12.5, color:'var(--text-muted)', lineHeight:1.8 }}>
          {isServer ? (<>
            <b style={{ color:'var(--text-2)' }}>Server Mode:</b><br/>
            • ข้อมูลเก็บใน <code style={{ background:'var(--surface-2)', padding:'1px 6px', borderRadius:4 }}>SQLite</code> บน server — ทุกเครื่องเห็นข้อมูลเดียวกัน<br/>
            • Real-time sync ผ่าน <b>SSE (Server-Sent Events)</b> — อัปเดตอัตโนมัติเมื่อมีการเปลี่ยนแปลง<br/>
            • ใช้ "สำรองข้อมูล" เพื่อดาวน์โหลด backup .json ไว้เก็บ
          </>) : (<>
            <b style={{ color:'var(--text-2)' }}>หมายเหตุฐานข้อมูล:</b><br/>
            • ข้อมูลเก็บใน <code style={{ background:'var(--surface-2)', padding:'1px 6px', borderRadius:4 }}>localStorage</code> ของเบราว์เซอร์นี้เท่านั้น<br/>
            • ใช้ "สำรองข้อมูล" เพื่อย้ายไปเครื่องอื่น หรือเปิดในเบราว์เซอร์อื่น<br/>
            • รองรับข้อมูลได้ประมาณ <b>5–10 MB</b> (~5,000+ เคส)<br/>
            • ต้องการ <b>ฐานข้อมูลจริง (SQLite)?</b> → รัน <code style={{ background:'var(--surface-2)', padding:'1px 6px', borderRadius:4 }}>start-server.bat</code>
          </>)}
        </div>
      </div>

      {/* ===== คำแนะนำ Node.js + SQLite (แสดงเฉพาะ localStorage mode) ===== */}
      {!isServer && <div className="panel" style={{ borderColor: window.hexA('#6366F1',.25) }}>
        <div className="panel-head">
          <h3 className="panel-title">อัปเกรดเป็นฐานข้อมูลจริง (Node.js + SQLite)</h3>
          <span style={{ fontSize:12, color:'var(--text-muted)', background:'var(--surface-3)', padding:'3px 9px', borderRadius:99 }}>ติดตั้งเพิ่มเติม</span>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:10, marginTop:14, fontSize:13.5 }}>
          {[
            ['1', 'ดาวโหลด Node.js', 'เปิด nodejs.org/download → เลือก LTS (Windows Installer .msi) → ติดตั้งปกติ', '#6366F1'],
            ['2', 'รันเซิร์ฟเวอร์ด้วย npm start', 'ดับเบิลคลิก start-server.bat ในโฟลเดอร์โปรแกรม → เปิดเบราว์เซอร์ที่ localhost:3000', '#14B8A6'],
            ['3', 'ข้อมูลเก็บลง SQLite', 'ไฟล์ claimtrack.db จะถูกสร้างอัตโนมัติ — แชร์ข้ามเครื่องได้ผ่าน LAN', '#10B981'],
          ].map(([n,title,desc,col]) => (
            <div key={n} style={{ display:'flex', gap:14, padding:'12px 14px', background:'var(--surface-3)', borderRadius:'var(--radius-sm)' }}>
              <span style={{ width:26, height:26, borderRadius:8, background:window.hexA(col,.18), color:col, display:'grid', placeItems:'center', fontSize:13, fontWeight:700, flexShrink:0 }}>{n}</span>
              <div>
                <div style={{ fontWeight:600, marginBottom:3 }}>{title}</div>
                <div style={{ fontSize:12.5, color:'var(--text-muted)' }}>{desc}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ marginTop:14 }}>
          <a href="https://nodejs.org/download" target="_blank" rel="noopener noreferrer">
            <Btn variant="primary" icon="download">เปิด nodejs.org/download →</Btn>
          </a>
        </div>
      </div>}

      {/* ===== จัดการสถานะ ===== */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12 }}>
        <h2 style={{ fontFamily:'var(--font-display)', fontSize:19, fontWeight:700 }}>จัดการสถานะ ({statuses.length} สถานะ)</h2>
        <Btn variant="primary" icon="plus" onClick={onAddStatus}>เพิ่ม / ระบุสถานะ</Btn>
      </div>

      {groups.map(g => (
        <div key={g.group} className="panel">
          <div className="panel-head">
            <h3 className="panel-title">{g.group}</h3>
            <span style={{ fontSize:12.5, color:'var(--text-muted)' }}>{g.items.length} สถานะ</span>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:2, marginTop:8 }}>
            {g.items.map(s => (
              <div key={s.key} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 6px', borderBottom:'1px solid var(--border)' }}>
                <span style={{ width:12, height:12, borderRadius:4, background:s.color, flexShrink:0, boxShadow:`0 0 8px ${window.hexA(s.color,.5)}` }}></span>
                <span style={{ flex:1, fontSize:13.5, color:'var(--text)' }}>{s.label}</span>
                {s.terminal && <span style={{ fontSize:11, color:'var(--text-muted)', background:'var(--surface-3)', padding:'2px 8px', borderRadius:99 }}>ปิด/เสร็จสิ้น</span>}
                <span style={{ fontSize:12.5, fontWeight:700, color:(sum.byStatus[s.key]||0)?'var(--text)':'var(--text-muted)', fontFeatureSettings:'"tnum"', minWidth:54, textAlign:'right' }}>{(sum.byStatus[s.key]||0).toLocaleString('th-TH')} เคส</span>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ===================================================================
// รายงานสรุประยะเวลาการจัดการเคสในแต่ละสถานะ (ตามตัวอย่าง CSV)
// ===================================================================

// ---- คำนวณวันที่เข้า/ออก และจำนวนวันในแต่ละสถานะ จาก event log ----
function buildStatusData(c) {
  const now = new Date();
  const evs = [...(c.events||[])].sort((a,b) => new Date(a.at)-new Date(b.at));

  const entryMap = {};  // statusKey → Date เข้าสถานะ
  const exitMap  = {};  // statusKey → Date ออกสถานะ

  let curKey   = 'received';
  let curStart = evs[0] ? new Date(evs[0].at) : now;
  entryMap['received'] = curStart;

  evs.forEach(e => {
    if (e.type !== 'status') return;
    const m = e.text.match(/"([^"]+)"/);
    if (!m) return;
    const found = window.STATUSES.find(s => s.label === m[1]);
    if (!found) return;
    const eAt = new Date(e.at);
    exitMap[curKey] = eAt;
    curKey = found.key;
    if (!entryMap[curKey]) entryMap[curKey] = eAt;
  });

  const confirmEv = evs.find(e => e.type === 'confirm');
  const importAt  = evs[0] ? new Date(evs[0].at) : null;
  const confirmAt = confirmEv ? new Date(confirmEv.at) : null;

  const getEntryDate = (key) => entryMap[key] || null;
  const getDays = (key) => {
    const entry = entryMap[key];
    if (!entry) return null;
    const exit = exitMap[key] || (c.billStatus === key ? now : null);
    if (!exit) return null;
    return Math.max(0, Math.round((exit - entry) / 86400000));
  };

  return { getEntryDate, getDays, importAt, confirmAt };
}

function DurationReport({ cases }) {
  const { useState: useSt, useMemo: useMm } = React;
  const [sortCol, setSortCol] = useSt('receiptNo');
  const [sortAsc, setSortAsc] = useSt(true);
  const now = new Date();

  const fmtD = (d) => { if (!d || isNaN(new Date(d))) return ''; return window.fmtDate(new Date(d)); };
  const roundDays = (d) => (d == null ? '' : Math.round(d));

  // คอลัมน์สถานะ "ดำเนินการ" (ไม่รวม closed)
  const statusCols = useMm(() =>
    window.STATUSES.filter(s => s.group === 'ดำเนินการ' && s.key !== 'closed'),
  []);

  // ชนิดคอลัมน์: "อยู่ระหว่าง" → วัน, อื่น → วันที่
  const colType = (s) => s.label.startsWith('อยู่ระหว่าง') ? 'days' : 'date';

  // สร้างข้อมูลแต่ละแถว
  const rows = useMm(() => cases.map(c => {
    const sd = buildStatusData(c);
    // รวมระยะเวลา = ผลรวมวันของสถานะ "อยู่ระหว่าง" ทั้งหมด
    const totalDays = statusCols
      .filter(s => colType(s) === 'days')
      .reduce((sum, s) => sum + (sd.getDays(s.key) || 0), 0);
    return { c, sd, totalDays };
  }), [cases, statusCols]);

  // เฉลี่ยต่อสถานะ (เฉพาะ days cols)
  const avgMap = useMm(() => {
    const m = {};
    rows.forEach(({ sd }) => statusCols.forEach(s => {
      if (colType(s) !== 'days') return;
      const d = sd.getDays(s.key);
      if (d == null) return;
      if (!m[s.key]) m[s.key] = { sum:0, n:0 };
      m[s.key].sum += d; m[s.key].n++;
    }));
    return m;
  }, [rows, statusCols]);
  const maxAvg = Math.max(...Object.values(avgMap).map(x => x.sum/x.n), 0.01);

  const sorted = useMm(() => {
    const dir = sortAsc ? 1 : -1;
    return [...rows].sort((a,b) => {
      if (sortCol==='receiptNo') return dir * a.c.receiptNo.localeCompare(b.c.receiptNo,'th');
      if (sortCol==='total') return dir * (a.totalDays - b.totalDays);
      return 0;
    });
  }, [rows, sortCol, sortAsc]);

  const th = (col, label, right=false) => (
    <th onClick={()=>{ if(sortCol===col) setSortAsc(a=>!a); else {setSortCol(col);setSortAsc(true);} }}
      style={{ padding:'11px 10px', background:'var(--surface)', fontSize:11, fontWeight:700, cursor:'pointer', userSelect:'none', whiteSpace:'nowrap', borderBottom:'1px solid var(--border)', color: sortCol===col?'var(--accent-2)':'var(--text-muted)', textAlign: right?'center':'left' }}>
      {label}{sortCol===col?(sortAsc?' ↑':' ↓'):''}
    </th>
  );
  const thFixed = (label, center=false) => (
    <th style={{ padding:'11px 10px', background:'var(--surface)', fontSize:11, fontWeight:700, whiteSpace:'nowrap', borderBottom:'1px solid var(--border)', color:'var(--text-muted)', textAlign:center?'center':'left' }}>{label}</th>
  );

  // ส่งออก CSV ตามโครงสร้างตัวอย่าง
  const exportCSV = () => {
    const esc = v => '"' + String(v==null?'':v).replace(/"/g,'""') + '"';
    const dayColHeaders = statusCols.filter(s=>colType(s)==='days').map(s=>`${s.label} (วัน)`);
    const dateColHeaders = statusCols.filter(s=>colType(s)==='date').map(s=>`วันที่${s.label}`);
    const head = ['เลขที่รับบิล','เลขที่บิล','วันที่เอกสาร','วันที่นำเข้า','วันที่ยืนยันรับ',
      ...dayColHeaders, ...dateColHeaders,
      'รวมระยะเวลาการดำเนินการ','มูลค่ายืนยันเคลม (บาท)','ผู้รับผิดชอบเคส (SC)','ผู้รับผิดชอบเคส (CC)'];
    const body = sorted.map(({c, sd, totalDays}) => [
      esc(c.receiptNo), esc(c.billNo||''), esc(c.docDate||''),
      esc(fmtD(sd.importAt)), esc(fmtD(sd.confirmAt)),
      ...statusCols.filter(s=>colType(s)==='days').map(s => esc(roundDays(sd.getDays(s.key)))),
      ...statusCols.filter(s=>colType(s)==='date').map(s => esc(fmtD(sd.getEntryDate(s.key)))),
      esc(Math.round(totalDays)),
      esc(c.claimAmount != null ? c.claimAmount : ''),
      esc(c.owner==='—'?'':c.owner||''),
      esc(c.ownerCC==='—'?'':c.ownerCC||''),
    ].join(','));
    const blob = new Blob(['﻿'+head.join(',')+'\n'+body.join('\n')], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='duration_report.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="page-pad" style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', flexWrap:'wrap', gap:14 }}>
        <div>
          <div style={{ fontSize:13, color:'var(--accent-2)', fontWeight:600, letterSpacing:'.04em' }}>รายงาน</div>
          <h1 style={{ fontFamily:'var(--font-display)', fontSize:26, fontWeight:700, margin:'4px 0 0', letterSpacing:'-0.02em' }}>สรุประยะเวลาการจัดการเคส</h1>
          <div style={{ fontSize:13.5, color:'var(--text-muted)', marginTop:4 }}>คำนวณจาก timeline ของแต่ละเคส · {cases.length} เคส</div>
        </div>
        <Btn variant="primary" icon="download" onClick={exportCSV}>ส่งออก CSV</Btn>
      </div>

      {/* ===== สรุปเฉลี่ยต่อสถานะ ===== */}
      <div className="panel">
        <div className="panel-head">
          <h3 className="panel-title">ระยะเวลาเฉลี่ยในแต่ละสถานะ (วัน)</h3>
          <span style={{ fontSize:12.5, color:'var(--text-muted)' }}>เฉลี่ยต่อเคส · เฉพาะสถานะ "อยู่ระหว่าง"</span>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:10, marginTop:14 }}>
          {statusCols.filter(s=>colType(s)==='days').map(s => {
            const avg = avgMap[s.key] ? avgMap[s.key].sum / avgMap[s.key].n : 0;
            const cnt = avgMap[s.key]?.n || 0;
            return (
              <div key={s.key}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5 }}>
                  <span style={{ display:'flex', alignItems:'center', gap:9, fontSize:13.5, color:'var(--text-2)', fontWeight:500 }}>
                    <span style={{ width:9, height:9, borderRadius:3, background:s.color, boxShadow:`0 0 8px ${hexA(s.color,.55)}` }}></span>{s.label}
                  </span>
                  <span style={{ fontSize:14, fontWeight:700, fontFeatureSettings:'"tnum"', color: avg>7?'#F87171':avg>3?'#FBBF24':'#34D399' }}>
                    {cnt ? Math.round(avg)+' วัน' : '—'}
                    <span style={{ fontSize:11, color:'var(--text-muted)', marginLeft:6 }}>({cnt} เคส)</span>
                  </span>
                </div>
                <div style={{ height:7, background:'var(--surface-3)', borderRadius:99, overflow:'hidden' }}>
                  <div style={{ width:cnt?(avg/maxAvg*100)+'%':'0%', height:'100%', background:`linear-gradient(90deg,${hexA(s.color,.5)},${s.color})`, borderRadius:99, transition:'width .7s cubic-bezier(.22,1,.36,1)' }}></div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ===== ตารางรายเคส ===== */}
      <div className="table-wrap">
        <table className="ctable">
          <thead>
            <tr>
              {th('receiptNo','เลขที่รับบิล')}
              {thFixed('เลขที่บิล')}
              {thFixed('วันที่เอกสาร')}
              {thFixed('วันที่นำเข้า')}
              {thFixed('วันที่ยืนยันรับ')}
              {statusCols.filter(s=>colType(s)==='days').map(s =>
                <th key={s.key} style={{ padding:'11px 10px', background:'var(--surface)', fontSize:11, fontWeight:700, whiteSpace:'nowrap', borderBottom:'1px solid var(--border)', color:'var(--text-muted)', textAlign:'center' }}>
                  <span style={{ display:'inline-block', width:7, height:7, borderRadius:2, background:s.color, marginRight:5 }}></span>
                  {s.label}<br/><span style={{ fontWeight:500 }}>(วัน)</span>
                </th>
              )}
              {statusCols.filter(s=>colType(s)==='date').map(s =>
                <th key={s.key} style={{ padding:'11px 10px', background:'var(--surface)', fontSize:11, fontWeight:700, whiteSpace:'nowrap', borderBottom:'1px solid var(--border)', color:'var(--text-muted)', textAlign:'center' }}>
                  <span style={{ display:'inline-block', width:7, height:7, borderRadius:2, background:s.color, marginRight:5 }}></span>
                  วันที่<br/>{s.label}
                </th>
              )}
              {th('total','รวมระยะเวลา\nดำเนินการ', true)}
              {thFixed('SC', true)}
              {thFixed('CC', true)}
            </tr>
          </thead>
          <tbody>
            {sorted.map(({ c, sd, totalDays }) => (
              <tr key={c.id} className="crow">
                <td>
                  <div style={{ fontWeight:700, fontSize:13, fontFeatureSettings:'"tnum"' }}>{c.receiptNo}</div>
                  <div style={{ fontSize:11.5, color:'var(--text-muted)', maxWidth:140, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{c.sender}</div>
                </td>
                <td style={{ fontSize:12.5, fontFeatureSettings:'"tnum"', color:'var(--text-2)' }}>{c.billNo||'—'}</td>
                <td style={{ fontSize:12.5, color:'var(--text-2)', whiteSpace:'nowrap' }}>{c.docDate||'—'}</td>
                <td style={{ fontSize:12.5, color:'var(--text-2)', whiteSpace:'nowrap' }}>{fmtD(sd.importAt)||'—'}</td>
                <td style={{ fontSize:12.5, color:'var(--text-2)', whiteSpace:'nowrap' }}>
                  {sd.confirmAt ? fmtD(sd.confirmAt) : <span style={{color:'var(--text-muted)'}}>รอยืนยัน</span>}
                </td>
                {statusCols.filter(s=>colType(s)==='days').map(s => {
                  const d = sd.getDays(s.key);
                  return (
                    <td key={s.key} style={{ textAlign:'center', fontFeatureSettings:'"tnum"', fontWeight:600, fontSize:14 }}>
                      {d != null
                        ? <span style={{ color: d>7?'#F87171':d>3?'#FBBF24':'var(--text)' }}>{Math.round(d)}</span>
                        : <span style={{ color:'var(--text-muted)', fontWeight:400, fontSize:12 }}>—</span>}
                    </td>
                  );
                })}
                {statusCols.filter(s=>colType(s)==='date').map(s => {
                  const dt = sd.getEntryDate(s.key);
                  return (
                    <td key={s.key} style={{ textAlign:'center', fontSize:12.5, color: dt?'var(--text-2)':'var(--text-muted)', whiteSpace:'nowrap' }}>
                      {dt ? fmtD(dt) : '—'}
                    </td>
                  );
                })}
                <td style={{ textAlign:'center', fontWeight:700, fontSize:14, fontFeatureSettings:'"tnum"',
                  color: totalDays>14?'#F87171':totalDays>7?'#FBBF24':'#34D399' }}>
                  {Math.round(totalDays)||'—'}
                </td>
                <td style={{ textAlign:'center', fontSize:12.5 }}>
                  {c.owner && c.owner!=='—' ? <span style={{ display:'inline-flex', alignItems:'center', gap:5 }}><Avatar name={c.owner} size={20} />{c.owner}</span> : <span style={{color:'var(--text-muted)'}}>—</span>}
                </td>
                <td style={{ textAlign:'center', fontSize:12.5 }}>
                  {c.ownerCC && c.ownerCC!=='—' ? <span style={{ display:'inline-flex', alignItems:'center', gap:5 }}><Avatar name={c.ownerCC} size={20} />{c.ownerCC}</span> : <span style={{color:'var(--text-muted)'}}>—</span>}
                </td>
              </tr>
            ))}
          </tbody>
          {sorted.length > 0 && (
            <tfoot>
              <tr style={{ background:'var(--surface-3)' }}>
                <td colSpan={5} style={{ padding:'10px 10px', fontSize:12, fontWeight:700, color:'var(--text-muted)' }}>เฉลี่ยรวม ({cases.length} เคส)</td>
                {statusCols.filter(s=>colType(s)==='days').map(s => {
                  const avg = avgMap[s.key] ? Math.round(avgMap[s.key].sum/avgMap[s.key].n) : null;
                  return <td key={s.key} style={{ textAlign:'center', fontWeight:700, fontSize:13, fontFeatureSettings:'"tnum"', color: avg>7?'#F87171':avg>3?'#FBBF24':'#34D399' }}>{avg!=null?avg:'—'}</td>;
                })}
                {statusCols.filter(s=>colType(s)==='date').map(s => <td key={s.key}></td>)}
                <td style={{ textAlign:'center', fontWeight:700, fontSize:13, fontFeatureSettings:'"tnum"' }}>
                  {Math.round(rows.reduce((s,r)=>s+r.totalDays,0)/Math.max(rows.length,1))}
                </td>
                <td colSpan={2}></td>
              </tr>
            </tfoot>
          )}
        </table>
        {sorted.length===0 && <div style={{ padding:'60px 20px', textAlign:'center', color:'var(--text-muted)' }}>ยังไม่มีข้อมูล</div>}
      </div>
    </div>
  );
}

    : ['settings', 'ตั้งค่าระบบ', 'นำเข้าข้อมูลจากไฟล์ Excel เคลียร์เคลม และจัดการเคสในระบบ', 'อัปโหลด Excel', onUpload];
